<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terror en Chimbas: Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 10; display: none; }
        #objetivo { position: absolute; bottom: 30px; left: 30px; font-size: 18px; background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #00ff00; }
        #subtitulos { position: absolute; bottom: 100px; width: 100%; text-align: center; font-size: 20px; color: #ffff00; width: 100%; }
        #noche-info { position: absolute; top: 30px; right: 30px; font-size: 24px; color: #ff0000; font-weight: bold; }
        
        #menu-inicio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #220000 0%, #000000 100%);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center;
        }
        #btn-jugar { padding: 20px 50px; font-size: 24px; background: #ff0000; color: white; border: none; cursor: pointer; box-shadow: 0 0 20px red; font-family: 'Courier New'; }

        #menu-dialogo { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid white; padding: 20px; z-index: 8000; color: white; width: 400px; pointer-events: auto;
        }
        .opcion-btn { display: block; width: 100%; background: #333; color: white; border: 1px solid #555; padding: 12px; margin: 10px 0; cursor: pointer; }
        #pantalla-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #ff3333; padding: 50px; z-index: 9999; text-align: center; }
    </style>
</head>
<body>

    <div id="menu-inicio">
        <h1 style="font-size: 3em; color: red;">TERROR EN CHIMBAS</h1>
        <p>Busca las cajas entre las alacenas y vuelve a casa.</p>
        <button id="btn-jugar">ENTRAR A LA TIENDA</button>
    </div>

    <div id="ui">
        <div id="noche-info">NOCHE 1</div>
        <div id="objetivo">Objetivo: Habla con Jony.</div>
        <div id="subtitulos"></div>
    </div>

    <div id="menu-dialogo">
        <p id="pregunta-jony" style="color: #00ff00; font-weight: bold;"></p>
        <div id="contenedor-opciones"></div>
    </div>

    <div id="pantalla-final">
        <h1 id="titulo-final">DIARIO DE SAN JUAN</h1>
        <div id="noticia-texto" style="font-size: 1.2em; margin: 30px;"></div>
        <button onclick="location.reload()" style="background: red; color: white; padding: 10px 20px; border: none; cursor: pointer;">REINTENTAR</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        let noche = 1, misionPaso = 0, cajasRecogidas = 0, muerto = false, persiguiendo = false, iniciado = false;
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ILUMINACIÓN
        scene.add(new THREE.AmbientLight(0xffffff, 0.15));
        const luzTienda = new THREE.PointLight(0xffffff, 0.9, 30);
        luzTienda.position.set(0, 5, 0); scene.add(luzTienda);
        const flashlight = new THREE.SpotLight(0xffffff, 0, 45, 0.4, 0.5);
        camera.add(flashlight);
        const lTarget = new THREE.Object3D(); camera.add(lTarget); lTarget.position.set(0,0,-5);
        flashlight.target = lTarget; scene.add(camera);

        const colisionables = [];
        function crearCaja(w, h, d, x, z, color = 0x222222, col = true) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({color: color}));
            m.position.set(x, h/2, z); scene.add(m);
            if(col) colisionables.push(new THREE.Box3().setFromObject(m));
            return m;
        }

        // TIENDA Y ALACENAS
        crearCaja(26, 5, 1, 0, -16); crearCaja(1, 5, 32, -13, 0); crearCaja(1, 5, 32, 13, 0);
        crearCaja(11, 5, 1, -7.5, 16); crearCaja(11, 5, 1, 7.5, 16); 
        crearCaja(4, 1.1, 2, -9, 11, 0x3d2b1f);
        for(let i=0; i<3; i++) {
            crearCaja(5, 3.5, 1.5, 7, 5-(i*9), 0x1a1a1a);
            crearCaja(5, 3.5, 1.5, -7, 5-(i*9), 0x1a1a1a);
        }

        // CIUDAD
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(600, 600), new THREE.MeshLambertMaterial({color: 0x050505}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);
        const posCasa = new THREE.Vector3(60, 1.7, 80);
        crearCaja(15, 8, 15, posCasa.x, posCasa.z, 0x052205);
        const luzCasa = new THREE.PointLight(0x00ff00, 1.5, 25);
        luzCasa.position.set(posCasa.x, 3, posCasa.z-10); scene.add(luzCasa);

        function crearPoste(x, z) {
            crearCaja(0.3, 6, 0.3, x, z, 0x000000);
            const l = new THREE.PointLight(0xffaa00, 1.2, 30); l.position.set(x, 5.5, z); scene.add(l);
        }
        for(let x=-150; x<=150; x+=50) {
            for(let z=-150; z<=150; z+=50) {
                if(Math.abs(x)<35 && Math.abs(z)<35) continue;
                crearCaja(25, 15, 25, x, z); crearPoste(x+15, z+15);
            }
        }

        // PERSONAJES
        function crearHumano(cR, cP) {
            const g = new THREE.Group();
            const t = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.7,0.25), new THREE.MeshLambertMaterial({color:cR}));
            t.position.y=1.2; t.name="torso"; g.add(t);
            const cab = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshLambertMaterial({color:cP}));
            cab.position.y=0.45; t.add(cab);
            const bD = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.6,0.12), new THREE.MeshLambertMaterial({color:cP}));
            bD.position.set(0.35,0,0); bD.name="brazoDer"; t.add(bD);
            const bI = bD.clone(); bI.position.x=-0.35; bI.name="brazoIzq"; t.add(bI);
            return g;
        }
        const jony = crearHumano(0x2244aa, 0xffdbac); jony.position.set(-8,0,9); scene.add(jony);
        const maniqui = crearHumano(0xffffff, 0xeeeeee); maniqui.position.set(10,0,-12); scene.add(maniqui);

        // MISIONES
        const itemsMision = [];
        function spawnCajas() {
            itemsMision.forEach(c => scene.remove(c)); itemsMision.length = 0;
            [{x: 7, z: 5}, {x: -7, z: -4}, {x: 0, z: -10}].forEach(p => {
                const c = crearCaja(0.7,0.7,0.7, p.x, p.z, 0x553311, false); itemsMision.push(c);
            });
        }
        spawnCajas();

        // LOGICA
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('btn-jugar').addEventListener('click', () => {
            document.getElementById('menu-inicio').style.display='none';
            document.getElementById('ui').style.display='block';
            iniciado = true;
            controls.lock();
            camera.position.set(0, 1.7, 13);
        });

        const keys = {}; document.addEventListener('keydown', e => keys[e.code]=true); document.addEventListener('keyup', e => keys[e.code]=false);
        function decir(t) { document.getElementById('subtitulos').innerText=t; setTimeout(()=>document.getElementById('subtitulos').innerText="",3000); }

        function mostrarDialogo() {
            controls.unlock();
            const m = document.getElementById('menu-dialogo'); m.style.display='block';
            document.getElementById('pregunta-jony').innerText = "Jony: ¿Alejo, acomodás las 3 cajas?";
            document.getElementById('contenedor-opciones').innerHTML = `<button class="opcion-btn" id="opt1">Sí, ya las busco.</button>`;
            document.getElementById('opt1').onclick = () => {
                m.style.display='none'; misionPaso=1; decir("Jony: Dale, fijate entre las alacenas.");
                document.getElementById('objetivo').innerText="Objetivo: Busca 3 cajas."; controls.lock();
            };
        }

        function final(t) {
            muerto = true; controls.unlock(); document.getElementById('pantalla-final').style.display='block';
            document.getElementById('noticia-texto').innerText = (t==="Muerte") ? "Alejo fue atrapado por algo blanco en Chimbas." : "¡Sobreviviste a la semana!";
        }

        function update() {
            requestAnimationFrame(update);
            if(!iniciado || !controls.isLocked || muerto) return;

            const oldPos = camera.position.clone();
            if(keys['KeyW']) controls.moveForward(0.24); if(keys['KeyS']) controls.moveForward(-0.24);
            if(keys['KeyA']) controls.moveRight(-0.24); if(keys['KeyD']) controls.moveRight(0.24);

            const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.7,1.8,0.7));
            for(let b of colisionables) { if(pBox.intersectsBox(b)) camera.position.copy(oldPos); }

            const pPos = camera.position;
            if(noche < 7) {
                if(misionPaso===0 && pPos.distanceTo(jony.position)<2.5) { mostrarDialogo(); misionPaso=-1; }
                if(misionPaso===1) {
                    itemsMision.forEach((c, i) => {
                        if(pPos.distanceTo(c.position)<2) { scene.remove(c); itemsMision.splice(i,1); cajasRecogidas++;
                        decir("Cajas: " + cajasRecogidas + "/3");
                        if(cajasRecogidas===3) { misionPaso=2; document.getElementById('objetivo').innerText="Vuelve a casa (Luz verde)."; } }
                    });
                }
                if(misionPaso===2 && pPos.distanceTo(posCasa)<12) {
                    noche++; misionPaso=0; cajasRecogidas=0; spawnCajas();
                    document.getElementById('noche-info').innerText = "NOCHE " + noche;
                    document.getElementById('objetivo').innerText = "Habla con Jony.";
                    camera.position.set(0,1.7,13);
                    if(noche===7) { scene.remove(jony); luzTienda.intensity=0.1; flashlight.intensity=6; }
                }
            } else {
                if(misionPaso===0 && pPos.distanceTo(new THREE.Vector3(-8,1,9))<3) { decir("¿Jony? Tengo que irme ya..."); misionPaso=1; }
                if(misionPaso===1) {
                    const dM = pPos.distanceTo(maniqui.position);
                    if(dM < 30) { 
                        persiguiendo=true; 
                        maniqui.getObjectByName("torso").position.y=0.4;
                        maniqui.getObjectByName("torso").rotation.x=Math.PI/2.2;
                        maniqui.getObjectByName("brazoDer").rotation.x=-Math.PI/2;
                        maniqui.getObjectByName("brazoIzq").rotation.x=-Math.PI/2;
                    }
                    if(persiguiendo) {
                        const dir = new THREE.Vector3().subVectors(pPos, maniqui.position).normalize();
                        maniqui.position.addScaledVector(dir, 0.25);
                        maniqui.lookAt(pPos.x, 0, pPos.z);
                        if(dM < 1.5) final("Muerte");
                    }
                    if(pPos.distanceTo(posCasa)<12) final("Salvado");
                }
            }
            renderer.render(scene, camera);
        }
        update();
    </script>
</body>
</html>
