<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terror en Chimbas: La Tienda Completa</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 10; text-shadow: 2px 2px black; display: none; }
        #objetivo { position: absolute; bottom: 30px; left: 30px; font-size: 18px; background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #00ff00; }
        #subtitulos { position: absolute; bottom: 100px; width: 100%; text-align: center; font-size: 20px; color: #ffff00; padding: 0 50px; }
        #noche-info { position: absolute; top: 30px; right: 30px; font-size: 24px; color: #ff0000; font-weight: bold; }
        
        #menu-inicio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #220000 0%, #000000 100%);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; text-align: center;
        }
        #btn-jugar { padding: 15px 40px; font-size: 20px; background: #ff0000; color: white; border: none; cursor: pointer; box-shadow: 0 0 15px red; }

        #menu-dialogo { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid white; padding: 20px; z-index: 2000; color: white; width: 450px; pointer-events: auto;
        }
        .opcion-btn { display: block; width: 100%; background: none; color: white; border: 1px solid #555; padding: 12px; margin: 10px 0; cursor: pointer; font-family: 'Courier New'; text-align: left; }
        .opcion-btn:hover { background: #222; border-color: #00ff00; color: #00ff00; }

        #pantalla-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #ff3333; padding: 50px; z-index: 1000; text-align: center; }
    </style>
</head>
<body>

    <div id="menu-inicio">
        <h1>TERROR EN CHIMBAS</h1>
        <p>Acomoda las cajas entre las alacenas y sobrevive a la noche 7.</p>
        <button id="btn-jugar">EMPEZAR TURNO</button>
    </div>

    <div id="ui">
        <div id="noche-info">NOCHE 1</div>
        <div id="objetivo">Objetivo: Habla con tu compañero Jony.</div>
        <div id="subtitulos"></div>
    </div>

    <div id="menu-dialogo">
        <p id="pregunta-jony" style="color: #00ff00; margin-bottom: 15px; font-weight: bold;"></p>
        <div id="contenedor-opciones"></div>
    </div>

    <div id="pantalla-final">
        <h1 id="titulo-final">DIARIO DE SAN JUAN</h1>
        <div id="noticia-texto" style="font-size: 1.3em; margin: 40px;"></div>
        <button onclick="location.reload()" style="background: red; color: white; border: none; padding: 10px 20px; cursor: pointer;">REINTENTAR</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        let noche = 1, misionPaso = 0, cajasRecogidas = 0, muerto = false, persiguiendo = false, iniciado = false;
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 13); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LUCES ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.1));
        const luzTienda = new THREE.PointLight(0xffffff, 0.9, 30);
        luzTienda.position.set(0, 5, 0); scene.add(luzTienda);

        const flashlight = new THREE.SpotLight(0xffffff, 0, 45, 0.35, 0.5);
        camera.add(flashlight);
        const lTarget = new THREE.Object3D();
        camera.add(lTarget);
        lTarget.position.set(0, 0, -5);
        flashlight.target = lTarget;
        scene.add(camera);

        const colisionables = [];
        function crearCaja(w, h, d, x, z, color = 0x222222, col = true) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({color: color}));
            m.position.set(x, h/2, z); scene.add(m);
            if(col) colisionables.push(new THREE.Box3().setFromObject(m));
            return m;
        }

        // --- MAPA TIENDA ---
        crearCaja(26, 5, 1, 0, -16); // Pared fondo
        crearCaja(1, 5, 32, -13, 0); // Pared izq
        crearCaja(1, 5, 32, 13, 0);  // Pared der
        crearCaja(11, 5, 1, -7.5, 16); // Pared frontal izq
        crearCaja(11, 5, 1, 7.5, 16);  // Pared frontal der
        crearCaja(4, 1.1, 2, -9, 11, 0x3d2b1f); // Mostrador
        
        // LAS ALACENAS (ESTANTES)
        for(let i=0; i<3; i++) {
            let zP = 5 - (i*9);
            crearCaja(5, 3.5, 1.5, 7, zP, 0x1a1a1a);  // Alacenas derecha
            crearCaja(5, 3.5, 1.5, -7, zP, 0x1a1a1a); // Alacenas izquierda
        }

        // --- CIUDAD ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshLambertMaterial({color: 0x050505}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        const posCasa = new THREE.Vector3(65, 1.7, 85); 
        crearCaja(18, 8, 18, posCasa.x, posCasa.z, 0x052205); // Casa Alejo
        const luzCasa = new THREE.PointLight(0x00ff00, 1.5, 25);
        luzCasa.position.set(posCasa.x, 3, posCasa.z - 11); scene.add(luzCasa);

        function crearPoste(x, z) {
            crearCaja(0.4, 6, 0.4, x, z, 0x000000);
            const l = new THREE.PointLight(0xffaa00, 1.3, 35);
            l.position.set(x, 5.5, z); scene.add(l);
            const glow = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xffcc33}));
            glow.position.set(x, 5.8, z); scene.add(glow);
        }

        for(let x = -160; x <= 160; x += 50) {
            for(let z = -160; z <= 160; z += 50) {
                if (Math.abs(x) < 40 && Math.abs(z) < 40) continue; 
                if (Math.abs(x - posCasa.x) < 30 && Math.abs(z - posCasa.z) < 30) continue; 
                crearCaja(30, 15 + Math.random()*20, 30, x, z, 0x111111);
                crearPoste(x + 22, z + 22);
            }
        }

        // --- PERSONAJES ---
        function crearHumanoide(colorRopa, colorPiel) {
            const grupo = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.25), new THREE.MeshLambertMaterial({color: colorRopa}));
            torso.position.y = 1.2; torso.name = "torso";
            const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12), new THREE.MeshLambertMaterial({color: colorPiel}));
            cabeza.position.y = 0.45; torso.add(cabeza);
            const bD = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.6, 0.12), new THREE.MeshLambertMaterial({color: colorPiel}));
            bD.position.set(0.35, 0, 0); bD.name = "brazoDer"; torso.add(bD);
            const bI = bD.clone(); bI.position.x = -0.35; bI.name = "brazoIzq"; torso.add(bI);
            const pD = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.8, 0.18), new THREE.MeshLambertMaterial({color: colorRopa}));
            pD.position.set(0.15, 0.4, 0); pD.name = "piernaDer"; grupo.add(pD);
            const pI = pD.clone(); pI.position.x = -0.15; pI.name = "piernaIzq"; grupo.add(pI);
            grupo.add(torso);
            return grupo;
        }

        const jony = crearHumanoide(0x2244aa, 0xffdbac);
        jony.position.set(-8, 0, 9); scene.add(jony);
        const maniqui = crearHumanoide(0xffffff, 0xeeeeee);
        maniqui.position.set(10, 0, -13); scene.add(maniqui);

        // --- MISIONES ---
        const itemsMision = [];
        function spawnCajas() {
            itemsMision.forEach(c => scene.remove(c)); itemsMision.length = 0;
            // Cajas ahora aparecen cerca de las alacenas
            const pos = [{x: 7, z: 5}, {x: -7, z: -4}, {x: 0, z: -10}];
            pos.forEach(p => {
                const c = crearCaja(0.8, 0.8, 0.8, p.x, p.z, 0x553311, false);
                itemsMision.push(c);
            });
        }
        spawnCajas();

        const datosDialogo = {
            1: { p: "Jony: ¿Me das una mano con estas 3 cajas, Alejo?", op: [{t: "Dale.", r: "Jony: Están entre los estantes de ropa."}] },
            2: { p: "Jony: ¿Viste que el maniquí parece que se mueve?", op: [{t: "Estás loco.", r: "Jony: Capaz... buscá las cajas rápido."}] },
            3: { p: "Jony: Che, afuera no se ve nada hoy.", op: [{t: "Seguí la luz naranja.", r: "Jony: Sí, menos mal que hay postes."}] },
            4: { p: "Jony: Me pareció ver algo blanco en el depósito...", op: [{t: "Iré a ver.", r: "Jony: No, dejá, terminemos esto."}] },
            5: { p: "Jony: Ya falta poco para el franco.", op: [{t: "Por fin.", r: "Jony: Sí... ojalá lleguemos."}] },
            6: { p: "Jony: Me voy yendo, mañana nos vemos.", op: [{t: "Chau Jony.", r: "Jony: Tené mucho cuidado al volver."}] }
        };

        function mostrarDialogo(n) {
            controls.unlock();
            const menu = document.getElementById('menu-dialogo');
            menu.style.display = 'block';
            document.getElementById('pregunta-jony').innerText = datosDialogo[n].p;
            const cont = document.getElementById('contenedor-opciones');
            cont.innerHTML = "";
            datosDialogo[n].op.forEach(o => {
                const btn = document.createElement('button'); btn.className = "opcion-btn"; btn.innerText = o.t;
                btn.onclick = () => { menu.style.display='none'; decir(o.r); misionPaso=1; document.getElementById('objetivo').innerText="Objetivo: Busca 3 cajas."; controls.lock(); };
                cont.appendChild(btn);
            });
        }

        // --- LOOP ---
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('btn-jugar').onclick = () => { document.getElementById('menu-inicio').style.display='none'; document.getElementById('ui').style.display='block'; iniciado=true; controls.lock(); };
        const keys = {}; document.addEventListener('keydown', (e) => keys[e.code] = true); document.addEventListener('keyup', (e) => keys[e.code] = false);
        function decir(t) { document.getElementById('subtitulos').innerText = t; setTimeout(() => document.getElementById('subtitulos').innerText="", 3500); }

        function setNoche(n) {
            noche = n; misionPaso = 0; cajasRecogidas = 0; camera.position.set(0, 1.7, 13);
            document.getElementById('noche-info').innerText = "NOCHE " + n;
            document.getElementById('objetivo').innerText = "Objetivo: Habla con Jony.";
            spawnCajas();
            if(n === 7) { scene.remove(jony); luzTienda.intensity=0.1; flashlight.intensity=6; }
        }

        function animarCuatroPatas() {
            const torso = maniqui.getObjectByName("torso");
            torso.position.y = 0.5;
            torso.rotation.x = Math.PI / 2.3;
            maniqui.getObjectByName("brazoDer").rotation.x = -Math.PI / 1.5;
            maniqui.getObjectByName("brazoIzq").rotation.x = -Math.PI / 1.5;
        }

        function update() {
            requestAnimationFrame(update);
            if (!iniciado || !controls.isLocked || muerto) return;
            
            const oldPos = camera.position.clone();
            if(keys['KeyW']) controls.moveForward(0.25); if(keys['KeyS']) controls.moveForward(-0.25);
            if(keys['KeyA']) controls.moveRight(-0.25); if(keys['KeyD']) controls.moveRight(0.25);

            const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.7, 1.8, 0.7));
            for(let box of colisionables) { if(pBox.intersectsBox(box)) camera.
