<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén de Chimbas - 5 Noches</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; background-color: black; color: white; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #contador-noche { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        #tareas { position: absolute; top: 60px; left: 20px; font-size: 18px; color: #ffcc00; text-shadow: 1px 1px 0 #000; }
        
        /* Menú interactivo de Jony */
        #menu-dialogo { display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(0, 0, 0, 0.8); border: 2px solid white; padding: 20px; pointer-events: auto; text-align: center; }
        #texto-dialogo { font-size: 20px; margin-bottom: 20px; }
        .opcion-btn { background: #333; color: white; border: 1px solid white; padding: 10px 20px; margin: 5px; cursor: pointer; font-family: inherit; font-size: 16px; transition: 0.2s; }
        .opcion-btn:hover { background: #555; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; background: rgba(255,255,255,0.5); transform: translate(-50%, -50%); border-radius: 50%; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; display: flex; align-items: center; justify-content: center; z-index: 10; pointer-events: auto; }
        #start-btn { font-size: 24px; padding: 15px 30px; cursor: pointer; background: darkred; color: white; border: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">Entrar al Almacén</button>
    </div>

    <div id="ui-layer">
        <div id="contador-noche">Noche: 1 / 5</div>
        <div id="tareas">Tarea: Ve a hablar con Jony al mostrador</div>
        <div id="crosshair"></div>
    </div>

    <div id="menu-dialogo">
        <div id="texto-dialogo">¿Qué onda? ¿Listo para el turno? Ojo con el sótano...</div>
        <div id="opciones-container">
            </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // Variables principales del juego
        let nocheActual = 1;
        let estadoTarea = "hablar_jony";
        let objetosRecolectados = 0;
        let rastroSangre = [];

        // Configuración de Three.js
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.05);
        scene.background = new THREE.Color(0x050505);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.PointerLockControls(camera, document.body);

        // UI Elements
        const uiContador = document.getElementById('contador-noche');
        const uiTareas = document.getElementById('tareas');
        const menuDialogo = document.getElementById('menu-dialogo');
        const textoDialogo = document.getElementById('texto-dialogo');
        const opcionesContainer = document.getElementById('opciones-container');

        // Movimiento y Físicas Básicas
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;
        let isCrouching = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // Entidades
        let jony, maniquiBlanco, mostrador;

        initGame();

        function initGame() {
            construirAlmacen();
            crearJony();
            crearManiqui();
            agregarLuces();

            document.getElementById('start-btn').addEventListener('click', function () {
                controls.lock();
                document.getElementById('start-screen').style.display = 'none';
            });

            // Controles de teclado
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            
            // Interacción (Click izquierdo)
            document.addEventListener('mousedown', interactuar);

            camera.position.set(0, 2, 10);
            animate();
        }

        function construirAlmacen() {
            // Piso
            const floorGeo = new THREE.PlaneGeometry(50, 50);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Mostrador
            const mostradorGeo = new THREE.BoxGeometry(4, 1.2, 1);
            const mostradorMat = new THREE.MeshStandardMaterial({ color: 0x4a3b2c });
            mostrador = new THREE.Mesh(mostradorGeo, mostradorMat);
            mostrador.position.set(0, 0.6, 0);
            scene.add(mostrador);

            // Alacenas
            const alacenaGeo = new THREE.BoxGeometry(1, 4, 10);
            const alacenaMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const alacena1 = new THREE.Mesh(alacenaGeo, alacenaMat);
            alacena1.position.set(-8, 2, 0);
            scene.add(alacena1);
        }

        function crearJony() {
            const jonyGeo = new THREE.BoxGeometry(1, 2, 1);
            const jonyMat = new THREE.MeshStandardMaterial({ color: 0x0000ff }); // Jony Azul
            jony = new THREE.Mesh(jonyGeo, jonyMat);
            jony.position.set(0, 1, -1.5);
            jony.castShadow = true;
            scene.add(jony);
        }

        function crearManiqui() {
            const maniquiGeo = new THREE.BoxGeometry(1.2, 2.5, 1.2); // Más grande que Jony
            const maniquiMat = new THREE.MeshStandardMaterial({ color: 0xffffff }); // Blanco puro
            maniquiBlanco = new THREE.Mesh(maniquiGeo, maniquiMat);
            maniquiBlanco.position.set(-10, 1.25, -10);
            maniquiBlanco.castShadow = true;
            maniquiBlanco.visible = false; // Se hace visible en ciertas noches
            scene.add(maniquiBlanco);
        }

        function agregarLuces() {
            const ambientLight = new THREE.AmbientLight(0x202020);
            scene.add(ambientLight);

            // Luz linterna del jugador
            const linterna = new THREE.SpotLight(0xffffff, 1);
            linterna.distance = 20;
            linterna.angle = Math.PI / 6;
            linterna.penumbra = 0.5;
            camera.add(linterna);
            linterna.position.set(0, 0, 1);
            linterna.target.position.set(0, 0, -1);
            camera.add(linterna.target);
            scene.add(camera);

            // Luz tenue mostrador
            const luzMostrador = new THREE.PointLight(0xffcc00, 0.8, 10);
            luzMostrador.position.set(0, 3, 0);
            scene.add(luzMostrador);
        }

        // Sistema de Diálogos Interactivo
        function interactuar() {
            if (controls.isLocked) {
                // Raycaster para ver si miramos a Jony
                const raycaster = new THREE.Raycaster(camera.position, camera.getWorldDirection(new THREE.Vector3()));
                const intersects = raycaster.intersectObject(jony);

                if (intersects.length > 0 && intersects[0].distance < 4 && nocheActual < 5) {
                    controls.unlock();
                    abrirMenuJony();
                }
            }
        }

        function abrirMenuJony() {
            menuDialogo.style.display = 'block';
            opcionesContainer.innerHTML = '';

            if (nocheActual === 1) {
                textoDialogo.innerText = "Jony: Che, andá a buscar unas cajas rojas atrás de las alacenas. Cuidado con ese maniquí blanco, da mala espina.";
                crearBoton("Aceptar misión", () => {
                    cerrarMenu();
                    estadoTarea = "buscar_cajas";
                    uiTareas.innerText = "Tarea: Busca 3 cajas rojas cerca del sótano";
                });
            } else if (nocheActual === 4) {
                textoDialogo.innerText = "Jony: Esto está mal... el maniquí se movió. Tené cuidado.";
                crearBoton("Terminar turno", () => {
                    cerrarMenu();
                    avanzarNoche();
                });
            } else {
                textoDialogo.innerText = "Jony: Dale, terminá tus tareas rápido así nos vamos.";
                crearBoton("Ya voy", cerrarMenu);
                crearBoton("Avanzar a la siguiente noche (Debug)", () => {
                    cerrarMenu();
                    avanzarNoche();
                });
            }
        }

        function crearBoton(texto, accion) {
            const btn = document.createElement('button');
            btn.className = 'opcion-btn';
            btn.innerText = texto;
            btn.onclick = accion;
            opcionesContainer.appendChild(btn);
        }

        function cerrarMenu() {
            menuDialogo.style.display = 'none';
            controls.lock();
        }

        function avanzarNoche() {
            nocheActual++;
            uiContador.innerText = `Noche: ${nocheActual} / 5`;
            
            if (nocheActual === 2) {
                maniquiBlanco.visible = true;
                maniquiBlanco.position.set(-8, 1.25, 2); // Se acerca
                uiTareas.innerText = "Tarea: Revisa las alacenas. ¡No lo mires fijamente!";
            }
            
            if (nocheActual === 5) {
                eventoTerrorFinal();
            }
        }

        function eventoTerrorFinal() {
            // Noche 5: Terror puro
            uiTareas.innerText = "Tarea: ¿Dónde está Jony?";
            uiTareas.style.color = "red";
            
            // Jony desaparece
            scene.remove(jony);
            
            // Rastro de sangre desde el mostrador hacia el sótano
            for(let i=0; i<5; i++) {
                const sangreGeo = new THREE.CircleGeometry(0.3, 8);
                const sangreMat = new THREE.MeshBasicMaterial({ color: 0x880000 });
                const gota = new THREE.Mesh(sangreGeo, sangreMat);
                gota.rotation.x = -Math.PI / 2;
                gota.position.set(0, 0.01, -2 - (i*2));
                scene.add(gota);
            }

            // El maniquí te persigue activamente o se planta en el mostrador
            maniquiBlanco.position.set(0, 1.25, -1.5);
            scene.fog.density = 0.1; // Niebla más densa
        }

        // Controles y físicas
        function onKeyDown(event) {
            switch (event.code) {
                case 'ArrowUp':
                case 'KeyW': moveForward = true; break;
                case 'ArrowLeft':
                case 'KeyA': moveLeft = true; break;
                case 'ArrowDown':
                case 'KeyS': moveBackward = true; break;
                case 'ArrowRight':
                case 'KeyD': moveRight = true; break;
                case 'Space': 
                    if (canJump) velocity.y += 10;
                    canJump = false;
                    break;
                case 'ShiftLeft':
                case 'KeyC':
                    isCrouching = true;
                    camera.position.y = 1.0; // Agacharse
                    break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'ArrowUp':
                case 'KeyW': moveForward = false; break;
                case 'ArrowLeft':
                case 'KeyA': moveLeft = false; break;
                case 'ArrowDown':
                case 'KeyS': moveBackward = false; break;
                case 'ArrowRight':
                case 'KeyD': moveRight = false; break;
                case 'ShiftLeft':
                case 'KeyC':
                    isCrouching = false;
                    camera.position.y = 2.0; // Levantarse
                    break;
            }
        }

        // Loop principal
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked === true) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 3.0 * delta; // Gravedad

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                const speed = isCrouching ? 20.0 : 40.0;

                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                controls.getObject().position.y += (velocity.y * delta);

                if (controls.getObject().position.y < (isCrouching ? 1.0 : 2.0)) {
                    velocity.y = 0;
                    controls.getObject().position.y = isCrouching ? 1.0 : 2.0;
                    canJump = true;
                }

                // Logica de Maniquí que te mira (LookAt)
                if (nocheActual >= 2 && maniquiBlanco) {
                    // Solo te mira, se queda quieto (estilo weeping angel o perturbador)
                    maniquiBlanco.lookAt(camera.position);
                    maniquiBlanco.rotation.x = 0; // Evita que se incline
                    maniquiBlanco.rotation.z = 0;
                }

                prevTime = time;
            }

            renderer.render(scene, camera);
        }

        // Ajuste de ventana
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
