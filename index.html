<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terror en Chimbas: El Turno de Alejo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 10; text-shadow: 2px 2px black; display: none; }
        #objetivo { position: absolute; bottom: 30px; left: 30px; font-size: 18px; background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #00ff00; }
        #subtitulos { position: absolute; bottom: 100px; width: 100%; text-align: center; font-size: 20px; color: #ffff00; padding: 0 50px; }
        #noche-info { position: absolute; top: 30px; right: 30px; font-size: 24px; color: #ff0000; font-weight: bold; }
        
        #menu-inicio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #220000 0%, #000000 100%);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; text-align: center;
        }
        #btn-jugar { 
            padding: 15px 40px; font-size: 22px; background: #ff0000; color: white; border: none; cursor: pointer; 
            font-family: 'Courier New'; margin-top: 20px; box-shadow: 0 0 15px red; pointer-events: auto;
        }
        #btn-jugar:hover { background: #aa0000; scale: 1.1; }

        #menu-dialogo { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid white; padding: 20px; z-index: 2000; color: white;
            pointer-events: auto; width: 450px;
        }
        .opcion-btn { display: block; width: 100%; background: none; color: white; border: 1px solid #555; padding: 12px; margin: 10px 0; cursor: pointer; font-family: 'Courier New'; }
        #pantalla-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #ff3333; padding: 50px; z-index: 10000; text-align: center; }
    </style>
</head>
<body>

    <div id="menu-inicio">
        <h1 style="font-size: 3.5em; color: #ff0000; margin-bottom: 10px;">TERROR EN CHIMBAS</h1>
        <p style="max-width: 600px; font-size: 1.2em;">San Juan, Argentina. Sos Alejo, empleado de una tienda.<br>Terminá tu turno... si podés.</p>
        <button id="btn-jugar">EMPEZAR TURNO</button>
    </div>

    <div id="ui">
        <div id="noche-info">NOCHE 1</div>
        <div id="objetivo">Objetivo: Habla con Jony.</div>
        <div id="subtitulos"></div>
    </div>

    <div id="menu-dialogo"><p id="pregunta-jony"></p><div id="contenedor-opciones"></div></div>
    <div id="pantalla-final"><h1 id="noticia-titulo">DIARIO DE CUYO</h1><div id="noticia-texto"></div><button onclick="location.reload()" style="background:red; color:white; padding:10px; border:none; cursor:pointer;">REINTENTAR</button></div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        let noche = 1, misionPaso = 0, cajasRecogidas = 0, muerto = false, persiguiendo = false, iniciado = false;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LUCES ---
        const luzAmbiental = new THREE.AmbientLight(0xffffff, 0.4); scene.add(luzAmbiental);
        const luzLocal = new THREE.PointLight(0xffffff, 1, 30); luzLocal.position.set(0, 3, 0); scene.add(luzLocal);
        const flashlight = new THREE.SpotLight(0xffffff, 0, 25, 0.4, 0.5);
        camera.add(flashlight); camera.add(flashlight.target); flashlight.target.position.set(0,0,-5);
        scene.add(camera);

        // --- MUNDO ---
        const colisionables = [];
        function crearCaja(w, h, d, x, z, color = 0x444444, col = true) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({color}));
            m.position.set(x, h/2, z); scene.add(m);
            if(col) colisionables.push(new THREE.Box3().setFromObject(m));
            return m;
        }
        crearCaja(26, 4, 1, 0, -16); crearCaja(1, 4, 32, -13, 0); crearCaja(1, 4, 32, 13, 0);
        crearCaja(11, 4, 1, -7.5, 16); crearCaja(11, 4, 1, 7.5, 16);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshPhongMaterial({color: 0x222222}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        // --- HUMANOS ---
        function crearHumanoide(colorRopa, colorPiel) {
            const grupo = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.25), new THREE.MeshPhongMaterial({color: colorRopa}));
            torso.name = "torso"; torso.position.y = 1.2;
            const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), new THREE.MeshPhongMaterial({color: colorPiel}));
            cabeza.position.y = 0.45; torso.add(cabeza);
            const bDer = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.6, 0.12), new THREE.MeshPhongMaterial({color: colorPiel}));
            bDer.name = "brazoDer"; bDer.position.set(0.35, 0, 0); torso.add(bDer);
            const bIzq = bDer.clone(); bIzq.name = "brazoIzq"; bIzq.position.x = -0.35; torso.add(bIzq);
            grupo.add(torso);
            const pDer = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.8, 0.18), new THREE.MeshPhongMaterial({color: colorRopa}));
            pDer.position.set(0.15, 0.4, 0); grupo.add(pDer);
            const pIzq = pDer.clone(); pIzq.position.x = -0.15; grupo.add(pIzq);
            return grupo;
        }

        const jony = crearHumanoide(0x2244aa, 0xffdbac); jony.position.set(-8, 0, 9); scene.add(jony);
        const maniqui = crearHumanoide(0xeeeeee, 0xeeeeee); maniqui.position.set(10, 0, -13); scene.add(maniqui);

        // --- LÓGICA DE INICIO ---
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('btn-jugar').addEventListener('click', () => {
            iniciado = true;
            document.getElementById('menu-inicio').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            controls.lock();
            camera.position.set(0, 1.7, 13);
        });

        const itemsMision = [];
        function spawnCajas() {
            itemsMision.forEach(c => scene.remove(c)); itemsMision.length = 0;
            for(let i=0; i<3; i++) {
                const c = crearCaja(0.7, 0.7, 0.7, (Math.random()-0.5)*15, (Math.random()-0.5)*15, 0x8b4513, false);
                itemsMision.push(c);
            }
        }
        spawnCajas();

        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function decir(txt) {
            document.getElementById('subtitulos').innerText = txt;
            setTimeout(() => document.getElementById('subtitulos').innerText = "", 3000);
        }

        function setNoche(n) {
            noche = n; misionPaso = 0; cajasRecogidas = 0;
            camera.position.set(0, 1.7, 13);
            document.getElementById('noche-info').innerText = `NOCHE ${n}`;
            if(n === 7) {
                luzAmbiental.intensity = 0.05; luzLocal.intensity = 0; flashlight.intensity = 5;
                scene.remove(jony);
                document.getElementById('objetivo').innerText = "¿Jony?";
            } else {
                document.getElementById('objetivo').innerText = "Habla con Jony.";
                spawnCajas();
            }
        }

        function update() {
            requestAnimationFrame(update);
            if (!iniciado || muerto) return;

            if (controls.isLocked) {
                const oldPos = camera.position.clone();
                if(keys['KeyW']) controls.moveForward(0.15);
                if(keys['KeyS']) controls.moveForward(-0.15);
                if(keys['KeyA']) controls.moveRight(-0.15);
                if(keys['KeyD']) controls.moveRight(0.15);

                const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.6, 1.8, 0.6));
                for(let box of colisionables) { if(pBox.intersectsBox(box)) camera.position.copy(oldPos); }

                const pPos = camera.position;
                if(noche < 7) {
                    if(misionPaso === 0 && pPos.distanceTo(jony.position) < 2) {
                        misionPaso = 1; decir("Jony: Hola Alejo, juntá esas 3 cajas y andate.");
                        document.getElementById('objetivo').innerText = "Recoge las cajas.";
                    }
                    if(misionPaso === 1) {
                        itemsMision.forEach((c, i) => {
                            if(pPos.distanceTo(c.position) < 1.5) {
                                scene.remove(c); itemsMision.splice(i, 1);
                                cajasRecogidas++; decir(`Cajas: ${cajasRecogidas}/3`);
                                if(cajasRecogidas === 3) { misionPaso = 2; document.getElementById('objetivo').innerText = "Sal por la puerta."; }
                            }
                        });
                    }
                    if(misionPaso === 2 && pPos.z > 15.5) setNoche(noche + 1);
                } else {
                    // NOCHE 7
                    if(misionPaso === 0 && pPos.distanceTo(new THREE.Vector3(-8, 0, 9)) < 2.5) {
                        decir("¡HAY SANGRE ACÁ!"); misionPaso = 1;
                        document.getElementById('objetivo').innerText = "¡CORRÉ A LA SALIDA!";
                    }
                    const distM = pPos.distanceTo(maniqui.position);
                    if(misionPaso === 1 && distM < 15) {
                        if(!persiguiendo) {
                            persiguiendo = true;
                            const t = maniqui.getObjectByName("torso");
                            t.rotation.x = Math.PI / 2.2;
                            maniqui.position.y = 0.3;
                            maniqui.getObjectByName("brazoDer").rotation.x = -Math.PI / 3;
                            maniqui.getObjectByName("brazoIzq").rotation.x = -Math.PI / 3;
                        }
                        const d = new THREE.Vector3().subVectors(pPos, maniqui.position).normalize();
                        maniqui.position.addScaledVector(d, 0.23);
                        maniqui.position.y = 0.3 + Math.sin(Date.now() * 0.01) * 0.1;
                        maniqui.lookAt(pPos.x, 0.4, pPos.z);
                        if(distM < 1.2) { muerto = true; final(); }
                    }
                    if(pPos.z > 15.5) { iniciado = false; alert("LOGRASTE ESCAPAR DE CHIMBAS..."); location.reload(); }
                }
            }
            renderer.render(scene, camera);
        }

        function final() {
            controls.unlock();
            document.getElementById('ui').style.display = 'none';
            document.getElementById('pantalla-final').style.display = 'block';
            document.getElementById('noticia-texto').innerText = "URGENTE: Empleado de comercio atacado por 'algo' en un local de Chimbas. No hubo sobrevivientes.";
        }
        update();
    </script>
</body>
</html>
