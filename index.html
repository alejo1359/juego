<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chimbas Horror: Visibilidad Total</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #gui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; display: none; }
        #status { position: absolute; top: 20px; left: 20px; text-shadow: 2px 2px #000; }
        #noche-label { color: #ff0000; font-size: 28px; font-weight: bold; }
        #mision-label { font-size: 18px; color: #00ff00; }
        #subtitulos { position: absolute; bottom: 120px; width: 100%; text-align: center; font-size: 22px; color: #ffff00; text-shadow: 2px 2px #000; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        h1 { color: red; font-size: 3.5em; margin: 0; }
        button { padding: 15px 40px; font-size: 20px; background: red; color: white; border: none; cursor: pointer; margin-top: 20px; font-family: inherit; }
        
        #dialogo-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid #444; padding: 25px; display: none; z-index: 200; color: white; text-align: center; width: 350px; }
    </style>
</head>
<body>

<div id="start-screen" class="overlay">
    <h1>TERROR EN CHIMBAS</h1>
    <p style="color: #888;">Optimizado: Ahora con piernas y mejor luz.</p>
    <button id="btn-start">EMPEZAR TURNO</button>
</div>

<div id="gui">
    <div id="status">
        <div id="noche-label">NOCHE 1</div>
        <div id="mision-label">Habla con Jony en el mostrador</div>
    </div>
    <div id="subtitulos"></div>
</div>

<div id="dialogo-box">
    <p id="dialogo-txt"></p>
    <button id="btn-mision" style="width: 100%;">ACEPTAR</button>
</div>

<div id="end-screen" class="overlay" style="display: none;">
    <h1 id="end-title">FIN DEL TURNO</h1>
    <p id="end-msg" style="text-align: center; padding: 20px;"></p>
    <button onclick="location.reload()">REINTENTAR</button>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

    let noche = 1, misionPaso = 0, cajasCunt = 0, muerto = false, persiguiendo = false;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.Fog(0x000000, 5, 60); // Niebla mucho más lejana

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- ILUMINACIÓN MEJORADA ---
    scene.add(new THREE.AmbientLight(0xffffff, 0.18)); // Más luz base
    
    const flashlight = new THREE.SpotLight(0xffffff, 0, 45, 0.45, 0.5); // Linterna más potente
    camera.add(flashlight);
    const flTarget = new THREE.Object3D(); flTarget.position.z = -1; camera.add(flTarget);
    flashlight.target = flTarget; scene.add(camera);

    const wallMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    const colBox = [];

    function box(w, h, d, x, z, mat = wallMat, col = true) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
        m.position.set(x, h/2, z);
        scene.add(m);
        if(col) colBox.push(new THREE.Box3().setFromObject(m));
        return m;
    }

    // --- TIENDA ---
    box(26, 6, 1, 0, -16); box(1, 6, 32, -13, 0); box(1, 6, 32, 13, 0);
    box(11, 6, 1, -7.5, 16); box(11, 6, 1, 7.5, 16); 
    box(4, 1.2, 2, -9, 11, new THREE.MeshLambertMaterial({color:0x4d3319})); // Mostrador
    
    // ALACENAS (ESTANTES)
    for(let i=0; i<3; i++){
        box(5, 4, 1.8, 7.5, 5-(i*9));
        box(5, 4, 1.8, -7.5, 5-(i*9));
    }

    // CIUDAD
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), new THREE.MeshLambertMaterial({color:0x050505}));
    floor.rotation.x = -Math.PI/2; scene.add(floor);

    function poste(x, z) {
        box(0.4, 7, 0.4, x, z, wallMat, false);
        const l = new THREE.PointLight(0xff9900, 2, 40); // Luz naranja potente
        l.position.set(x, 6.5, z); scene.add(l);
        const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color:0xffaa00}));
        bulb.position.set(x, 6.7, z); scene.add(bulb);
    }
    for(let i=0; i<12; i++) {
        let ang = (i / 12) * Math.PI * 2;
        poste(Math.cos(ang)*70, Math.sin(ang)*70);
    }

    const posCasa = new THREE.Vector3(60, 1.7, 60);
    box(14, 8, 14, posCasa.x, posCasa.z, new THREE.MeshLambertMaterial({color:0x002200}));
    const lCasa = new THREE.PointLight(0x00ff00, 2.5, 30);
    lCasa.position.set(posCasa.x, 3, posCasa.z - 8); scene.add(lCasa);

    // --- PERSONAJES CON PIERNAS ---
    function body(colorRopa, colorPiel) {
        const grupo = new THREE.Group();
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.25), new THREE.MeshLambertMaterial({color: colorRopa}));
        torso.position.y = 1.2; torso.name="torso"; grupo.add(torso);
        const cab = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshLambertMaterial({color: colorPiel}));
        cab.position.y = 0.5; torso.add(cab);
        const bD = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.6, 0.12), new THREE.MeshLambertMaterial({color: colorPiel}));
        bD.position.set(0.35, 0, 0); bD.name="brazoDer"; torso.add(bD);
        const bI = bD.clone(); bI.position.x = -0.35; bI.name="brazoIzq"; torso.add(bI);
        // Piernas unidas al grupo principal
        const pD = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.8, 0.18), new THREE.MeshLambertMaterial({color: colorRopa}));
        pD.position.set(0.15, 0.4, 0); pD.name="piernaDer"; grupo.add(pD);
        const pI = pD.clone(); pI.position.x = -0.15; pI.name="piernaIzq"; grupo.add(pI);
        return grupo;
    }

    const jony = body(0x2244aa, 0xffdbac); jony.position.set(-8, 0, 9); scene.add(jony);
    const maniqui = body(0xffffff, 0xeeeeee); maniqui.position.set(10, 0, -12); scene.add(maniqui);

    // --- CAJAS ---
    const cajaItems = [];
    function setCajas() {
        cajaItems.forEach(c => scene.remove(c)); cajaItems.length = 0;
        const pos = [{x:7, z:5}, {x:-7, z:-4}, {x:0, z:-10}];
        pos.forEach(p => {
            const c = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.8), new THREE.MeshLambertMaterial({color:0x80552b}));
            c.position.set(p.x, 0.4, p.z); scene.add(c); cajaItems.push(c);
        });
    }
    setCajas();

    // --- CONTROLES ---
    const controls = new PointerLockControls(camera, document.body);
    document.getElementById('btn-start').onclick = () => {
        document.getElementById('start-screen').style.display='none';
        document.getElementById('gui').style.display='block';
        controls.lock(); camera.position.set(0, 1.7, 13);
    };

    const keys = {}; document.addEventListener('keydown', e => keys[e.code]=true); document.addEventListener('keyup', e => keys[e.code]=false);
    function decir(t) { document.getElementById('subtitulos').innerText=t; setTimeout(()=>document.getElementById('subtitulos').innerText="",3000); }

    function mostrarDialogo() {
        controls.unlock();
        const m = document.getElementById('dialogo-box'); m.style.display='block';
        document.getElementById('dialogo-txt').innerText = "Jony: ¿Alejo, me das una mano buscando 3 cajas entre las alacenas?";
        document.getElementById('btn-mision').onclick = () => {
            m.style.display='none'; misionPaso=1;
            document.getElementById('mision-label').innerText="Cajas: 0/3"; controls.lock();
        };
    }

    function final(res) {
        muerto = true; controls.unlock(); document.getElementById('end-screen').style.display='flex';
        document.getElementById('end-title').innerText = res==="Salvado" ? "¡LOGRADO!" : "CAPTURADO";
        document.getElementById('end-msg').innerText = res==="Salvado" ? "Llegaste a casa justo a tiempo. El maniquí se quedó en la ventana." : "Alejo desapareció en Chimbas. Las piernas del maniquí se oían por toda la calle.";
    }

    function update() {
        requestAnimationFrame(update);
        if(!controls.isLocked || muerto) return;

        const oldPos = camera.position.clone();
        if(keys['KeyW']) controls.moveForward(0.24); if(keys['KeyS']) controls.moveForward(-0.24);
        if(keys['KeyA']) controls.moveRight(-0.24); if(keys['KeyD']) controls.moveRight(0.24);

        const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.7, 1.8, 0.7));
        for(let b of colBox) if(pBox.intersectsBox(b)) camera.position.copy(oldPos);

        const pPos = camera.position;

        if(noche < 7) {
            if(misionPaso===0 && pPos.distanceTo(jony.position)<2.5) { mostrarDialogo(); misionPaso=-1; }
            if(misionPaso===1) {
                cajaItems.forEach((c, i) => {
                    if(pPos.distanceTo(c.position)<2) { scene.remove(c); cajaItems.splice(i,1); cajasCunt++;
                    decir("¡Recogida! ("+cajasCunt+"/3)");
                    if(cajasCunt===3) { misionPaso=2; document.getElementById('mision-label').innerText="¡VETE A CASA! (Luz Verde)"; } }
                });
            }
            if(misionPaso===2 && pPos.distanceTo(posCasa)<12) {
                noche++; misionPaso=0; cajasCunt=0; setCajas();
                document.getElementById('noche-info').innerText = "NOCHE " + noche;
                document.getElementById('mision-label').innerText = "Habla con Jony";
                camera.position.set(0,1.7,13);
                if(noche===7) { scene.remove(jony); flashlight.intensity=6; }
            }
        } else {
            if(misionPaso===0 && pPos.distanceTo(new THREE.Vector3(-8,0,9))<3) { decir("¿Jony? ¡Tengo que irme!"); misionPaso=1; }
            if(misionPaso===1) {
                const dM = pPos.distanceTo(maniqui.position);
                if(dM < 40) {
                    persiguiendo=true; 
                    const t = maniqui.getObjectByName("torso");
                    t.position.y = 0.5; t.rotation.x = Math.PI/2.2;
                    maniqui.getObjectByName("brazoDer").rotation.x = -Math.PI/2;
                    maniqui.getObjectByName("brazoIzq").rotation.x = -Math.PI/2;
                    // Piernas en pose de arrastre
                    maniqui.getObjectByName("piernaDer").position.y = 0.2;
                    maniqui.getObjectByName("piernaIzq").position.y = 0.2;
                }
                if(persiguiendo) {
                    const dir = new THREE.Vector3().subVectors(pPos, maniqui.position).normalize();
                    maniqui.position.addScaledVector(dir, 0.25);
                    maniqui.lookAt(pPos.x, 0, pPos.z);
                    if(dM < 1.7) final("Muerte");
                }
                if(pPos.distanceTo(posCasa)<12) final("Salvado");
            }
        }
        renderer.render(scene, camera);
    }
    update();
</script>
</body>
</html>
