<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén de Chimbas V47 - Escalera y Guardián Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 5; }
        #bloqueo { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; }
        #mision-ui { position: absolute; top: 20px; left: 20px; font-size: 1.2em; color: #ffcc00; }
        #dialogo-box { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(0,0,0,0.9); border: 2px solid #ffcc00; padding: 20px; display: none; pointer-events: auto; }
        .btn { display: block; width: 100%; padding: 10px; margin-top: 10px; background: #222; color: #ffcc00; border: 1px solid #ffcc00; cursor: pointer; }
    </style>
</head>
<body>

    <div id="bloqueo" onclick="iniciar()">
        <div style="border: 4px solid #ffcc00; padding: 40px; background: #000; text-align: center;">
            <h1 style="color: #ffcc00;">ALMACÉN DE CHIMBAS</h1>
            <p style="color: white; font-size: 1.5em; margin: 20px 0;">CLICK PARA JUGAR</p>
            <p style="color: #777;">W,A,S,D: Caminar | ESPACIO: Saltar | SHIFT: Agacharse</p>
        </div>
    </div>

    <div id="ui">
        <div id="mision-ui">Cajas Rojas: 0/3</div>
        <div id="dialogo-box">
            <p id="txt-jony" style="color: white; margin-bottom: 10px;"></p>
            <button class="btn" onclick="cerrar()">Entendido</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x000000, 1, 35);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 1, 50);
        camera.add(light);
        scene.add(camera);

        const colisiones = [];
        function box(w, h, d, x, y, z, color=0x222222, col=true) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshBasicMaterial({color}));
            m.position.set(x,y,z); scene.add(m);
            if(col) colisiones.push(new THREE.Box3().setFromObject(m));
            return m;
        }

        // --- MAPA ---
        box(40, 0.1, 40, 0, 0, 0, 0x111111); // Suelo
        box(40, 8, 1, 0, 4, -20); box(40, 8, 1, 0, 4, 20); // Paredes
        box(1, 8, 40, -20, 4, 0); box(1, 8, 40, 20, 4, 0);

        // Muebles
        box(4, 1.2, 2.5, 8, 0.6, -5, 0x4e342e); // Mesa Jony
        for(let i=0; i<3; i++) box(6, 4, 2, -12, 2, -10 + (i*10), 0x333333);

        // --- EL NUEVO SÓTANO ---
        const sX = 15, sY = -8, sZ = 5;
        // Hueco en el suelo
        const hueco = box(6, 0.2, 6, sX, 0, sZ, 0x000000, false); 
        // Cuarto de abajo
        box(12, 0.1, 12, sX, sY, sZ, 0x080808); 
        box(12, 10, 0.5, sX, sY+5, sZ-6); box(12, 10, 0.5, sX, sY+5, sZ+6);
        box(0.5, 10, 12, sX+6, sY+5, sZ); 
        const paredEscalera = box(0.5, 10, 12, sX-6, sY+5, sZ);

        // LA ESCALERA (Barras amarillas)
        for(let i=0; i<15; i++) {
            const peldaño = box(2, 0.2, 0.2, sX-5.7, sY + (i*0.7), sZ, 0xffff00, false);
        }

        // --- PERSONAJES ---
        const loader = new GLTFLoader();
        let jony, guardian, mixerJ, mixerG;

        // Jony
        loader.load("https://cdn.pixabay.com/download/objects3d/2025/07/17/processed_1161__c5db61fbe5.glb?filename=quaternius_cc0-male-character-1161.glb", (g) => {
            jony = g.scene; jony.scale.set(0.5, 0.5, 0.5); jony.position.set(8, 0, -6.5);
            jony.rotation.y = Math.PI * 0.7; scene.add(jony);
            mixerJ = new THREE.AnimationMixer(jony);
            mixerJ.clipAction(g.animations[0]).play();
        });

        // EL GUARDIÁN BLANCO (Usando el modelo subido)
        loader.load("https://raw.githubusercontent.com/Juan-Alejo-Desarrollo/Alejo-Juego-GitHub/main/quaternius_cc0-male-character-1352.glb", (g) => {
            guardian = g.scene; guardian.scale.set(0.6, 0.6, 0.6); guardian.position.set(0, 0, 5);
            guardian.traverse(n => { if(n.isMesh) n.material = new THREE.MeshBasicMaterial({color: 0xffffff}); });
            scene.add(guardian);
            mixerG = new THREE.AnimationMixer(guardian);
            mixerG.clipAction(g.animations[0]).play();
        }, undefined, (err) => {
            // Si falla el link de github, creamos uno de emergencia para que Alejo pueda jugar
            console.log("Cargando guardián de emergencia...");
            const dummyG = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1), new THREE.MeshBasicMaterial({color: 0xffffff}));
            dummyG.position.set(0, 1, 5); scene.add(dummyG);
        });

        // --- LÓGICA ---
        const controls = new PointerLockControls(camera, document.body);
        window.iniciar = () => { document.getElementById('bloqueo').style.display='none'; controls.lock(); };
        window.cerrar = () => { document.getElementById('dialogo-box').style.display='none'; controls.lock(); };

        const cajas = []; let puntos = 0;
        function nCaja(x,y,z) { const c = box(0.6, 0.6, 0.6, x, y, z, 0xff0000, false); cajas.push(c); }
        nCaja(-10, 0.5, -10); nCaja(sX+2, sY+0.5, sZ); nCaja(-5, 0.5, 10);

        const keys = {};
        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);

        let velY = 0; let agachado = false;
        function animate() {
            requestAnimationFrame(animate);
            const delta = 0.016;
            if(mixerJ) mixerJ.update(delta);
            if(mixerG) mixerG.update(delta);

            if(controls.isLocked) {
                const prev = camera.position.clone();
                let spd = keys['ShiftLeft'] ? 0.06 : 0.12;
                if(keys['KeyW']) controls.moveForward(spd);
                if(keys['KeyS']) controls.moveForward(-spd);
                if(keys['KeyA']) controls.moveRight(-spd);
                if(keys['KeyD']) controls.moveRight(spd);

                // Gravedad básica
                camera.position.y += velY; velY -= 0.008;

                // Suelo Inteligente
                let ground = 1.7;
                // Si estás sobre el hueco del sótano
                if (camera.position.x > sX-3 && camera.position.x < sX+3 && camera.position.z > sZ-3 && camera.position.z < sZ+3) {
                    ground = -100; // Caen
                }
                // Si estás dentro de los límites del sótano abajo
                if (camera.position.x > sX-5 && camera.position.x < sX+5 && camera.position.z > sZ-5 && camera.position.z < sZ+5 && camera.position.y < -2) {
                    ground = sY + 1.7;
                }

                if(camera.position.y < ground) { camera.position.y = ground; velY = 0; }

                // ESCALERA DE MANO (Lógica de subida)
                const distEsc = camera.position.distanceTo(new THREE.Vector3(sX-5, camera.position.y, sZ));
                if(distEsc < 1.5) {
                    if(keys['KeyW']) { camera.position.y += 0.15; velY = 0; }
                }

                // Colisiones paredes
                const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.7, 1, 0.7));
                for(let b of colisiones) { if(pBox.intersectsBox(b)) camera.position.copy(prev); }

                // Cajas
                cajas.forEach(c => {
                    if(c.visible && camera.position.distanceTo(c.position) < 1.5) {
                        c.visible = false; puntos++;
                        document.getElementById('mision-ui').innerText = "Cajas Rojas: " + puntos + "/3";
                    }
                });

                // Diálogo Jony
                if(camera.position.distanceTo(new THREE.Vector3(8, 0, -5)) < 2.5 && !agachado) {
                    document.getElementById('dialogo-box').style.display='block';
                    document.getElementById('txt-jony').innerText = "Jony: '¡Alejo! Cuidado con el Guardián Blanco que está ahí parado. Me olvidé las cajas, una se cayó por ese hueco al sótano. Usá la escalera amarilla de la pared para subir.'";
                    controls.unlock(); agachado = true; // Uso agachado para que no repita el dialogo
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
