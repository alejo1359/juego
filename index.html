<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén de Chimbas V46 - Menú Fix y Guardián Blanco</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 5; }
        
        /* ESTILO MENÚ DE INICIO ARREGLADO V46 */
        #bloqueo { 
            position: absolute; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 2000; cursor: pointer; text-align: center;
        }
        #instrucciones { padding: 40px; border: 4px solid #ffcc00; background: #000; }
        
        #dialogo-box { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 600px; background: rgba(0,0,0,0.9); border: 2px solid #ffcc00; padding: 20px; display: none; pointer-events: auto; }
        .opcion-btn { display: block; width: 100%; padding: 10px; margin-top: 10px; background: #111; color: #ffcc00; border: 1px solid #ffcc00; cursor: pointer; }
        #mision-ui { position: absolute; top: 20px; left: 20px; font-size: 1.2em; color: #ffcc00; text-shadow: 2px 2px #000;}
    </style>
</head>
<body>

    <div id="bloqueo" onclick="iniciarJuego()">
        <div id="instrucciones">
            <h1 style="color: #ffcc00; margin-bottom: 20px; font-size: 2.5em;">ALMACÉN DE CHIMBAS</h1>
            <p style="font-size: 1.8em; color: white;">Hacé CLICK para EMPEZAR</p>
            <p style="font-size: 0.9em; color: #aaa; margin-top:25px;">W,A,S,D: Caminar | ESPACIO: Saltar | SHIFT: Agacharse</p>
        </div>
    </div>

    <div id="ui">
        <div id="mision-ui">Cajas rojas: 0/3</div>
        <div id="dialogo-box">
            <p id="texto-jony"></p>
            <div id="opciones-contenedor"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.FogExp2(0x000000, 0.08);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(luzAmbiente);
        const linterna = new THREE.SpotLight(0xffffff, 8, 30, 0.6, 0.2);
        camera.add(linterna);
        camera.add(linterna.target);
        linterna.target.position.z = -5;
        scene.add(camera);

        const colisiones = [];
        function crearCaja(w, h, d, x, y, z, color = 0x1a1a1a, esPared = true) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshBasicMaterial({ color: color }));
            mesh.position.set(x, y, z);
            scene.add(mesh);
            if(esPared) colisiones.push(new THREE.Box3().setFromObject(mesh));
            return mesh;
        }

        // --- PLANTA PRINCIPAL ---
        crearCaja(40, 0.1, 15, 0, 0, -12.5);
        crearCaja(40, 0.1, 15, 0, 0, 12.5);
        crearCaja(15, 0.1, 10, -12.5, 0, 0);
        crearCaja(15, 0.1, 10, 12.5, 0, 0);

        crearCaja(40, 8, 1, 0, 4, -20); crearCaja(40, 8, 1, 0, 4, 20);
        crearCaja(1, 8, 40, -20, 4, 0); crearCaja(1, 8, 40, 20, 4, 0);

        for(let i=0; i<3; i++) { crearCaja(6, 4, 2, -12, 2, -10 + (i*10), 0x222222); }
        crearCaja(4, 1.2, 2.5, 8, 0.5, -5, 0x4e342e);

        // --- SÓTANO ---
        const sX = 15, sY = -7, sZ = 0;
        crearCaja(10, 0.1, 10, sX, sY, sZ, 0x111111);
        crearCaja(10, 8, 0.5, sX, sY+4, sZ-5, 0x0a0a0a);
        crearCaja(10, 8, 0.5, sX, sY+4, sZ+5, 0x0a0a0a);
        crearCaja(0.5, 8, 10, sX+5, sY+4, sZ, 0x0a0a0a);
        crearCaja(0.5, 8, 10, sX-5, sY+4, sZ, 0x333333);

        const ladder = new THREE.Mesh(new THREE.BoxGeometry(0.2, 8, 2), new THREE.MeshBasicMaterial({color: 0xffcc00}));
        ladder.position.set(sX-4.8, sY+4, sZ);
        scene.add(ladder);

        // --- OBJETOS MISIÓN ---
        const cajasMision = []; let contador = 0;
        function nuevaCaja(x, y, z) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshBasicMaterial({color: 0xff0000}));
            m.position.set(x, y, z); scene.add(m); cajasMision.push(m);
        }
        nuevaCaja(-15, 0.5, -15); nuevaCaja(sX+2, sY+0.5, sZ+2); nuevaCaja(-5, 0.5, 15);

        // --- JONY (Modelo original) ---
        let jony, mixerJony;
        new GLTFLoader().load("https://cdn.pixabay.com/download/objects3d/2025/07/17/processed_1161__c5db61fbe5.glb?filename=quaternius_cc0-male-character-1161.glb", (g) => {
            jony = g.scene; jony.scale.set(0.5, 0.5, 0.5); jony.position.set(8, 0, -6.2);
            jony.rotation.y = Math.PI * 0.7; scene.add(jony);
            mixerJony = new THREE.AnimationMixer(jony);
            const idle = THREE.AnimationClip.findByName(g.animations, 'Idle');
            if(idle) mixerJony.clipAction(idle).play();
        });

        // --- EL GUARDIÁN BLANCO (Nuevo Modelo V46) ---
        let guardian, mixerGuardian;
        const matBlancoPuro = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 }); // Material blanco fantasma
        
        new GLTFLoader().load("https://raw.githubusercontent.com/Juan-Alejo-Desarrollo/Alejo-Juego-GitHub/main/quaternius_cc0-male-character-1352.glb", (g) => {
            guardian = g.scene;
            guardian.scale.set(0.6, 0.6, 0.6); // Un poco más alto que Jony
            guardian.position.set(2, 0, -8); // Parado en el pasillo central
            
            // Forzar material blanco puro a TODO el modelo
            guardian.traverse((child) => {
                if (child.isMesh) {
                    child.material = matBlancoPuro;
                    if(child.name.includes("Extra")) child.visible = false; // Sacar gorros/mochilas
                }
            });
            
            scene.add(guardian);
            
            mixerGuardian = new THREE.AnimationMixer(guardian);
            const idle = THREE.AnimationClip.findByName(g.animations, 'Idle');
            if(idle) mixerGuardian.clipAction(idle).play();
        });

        // --- DIÁLOGOS ---
        let hablando = false, yaHablo = false;
        const boxD = document.getElementById('dialogo-box');
        window.cerrarD = () => { hablando = false; boxD.style.display = 'none'; controls.lock(); };

        // --- MOVIMIENTO Y FÍSICAS ---
        const controls = new PointerLockControls(camera, document.body);
        
        // Lógica de inicio V46
        window.iniciarJuego = () => {
            document.getElementById('bloqueo').style.display = 'none';
            controls.lock();
        };

        const keys = {};
        let velY = 0, enSuelo = true, agachado = false;
        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            if(e.code === 'Space' && enSuelo && !hablando) velY = 0.15;
            if(e.code === 'ShiftLeft') agachado = true;
        });
        document.addEventListener('keyup', (e) => { keys[e.code] = false; if(e.code === 'ShiftLeft') agachado = false; });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if(mixerJony) mixerJony.update(delta);
            if(mixerGuardian) mixerGuardian.update(delta);

            if (controls.isLocked && !hablando) {
                const posAnt = camera.position.clone();
                let spd = agachado ? 0.07 : 0.14;
                if(keys['KeyW']) controls.moveForward(spd);
                if(keys['KeyS']) controls.moveForward(-spd);
                if(keys['KeyA']) controls.moveRight(-spd);
                if(keys['KeyD']) controls.moveRight(spd);

                // --- GRAVEDAD Y SUELOS ---
                camera.position.y += velY; velY -= 0.008;
                let nivelSuelo = -100;
                
                if (Math.abs(camera.position.x) < 20 && Math.abs(camera.position.z) < 20) {
                    if (!(camera.position.x > 5 && camera.position.x < 25 && Math.abs(camera.position.z) < 5)) {
                        nivelSuelo = 1.7;
                    }
                }
                if (Math.abs(camera.position.x - sX) < 5 && Math.abs(camera.position.z - sZ) < 5) {
                    nivelSuelo = sY + 1.7;
                }
                if(agachado) nivelSuelo -= 0.8;
                if (camera.position.y < nivelSuelo) { camera.position.y = nivelSuelo; velY = 0; enSuelo = true; } else { enSuelo = false; }

                // SUBIR ESCALERA
                if (camera.position.distanceTo(new THREE.Vector3(sX-4.5, camera.position.y, sZ)) < 1.5 && keys['KeyW']) {
                    camera.position.y += 0.15; velY = 0; enSuelo = true;
                }

                // COLISIONES PAREDES
                const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.8, 1, 0.8));
                colisiones.forEach(b => { if(pBox.intersectsBox(b)) camera.position.copy(posAnt); });

                // RECOLECCIÓN CAJAS
                cajasMision.forEach(c => {
                    if(c.visible && camera.position.distanceTo(c.position) < 1.5) {
                        c.visible = false; contador++;
                        document.getElementById('mision-ui').innerText = "Cajas rojas: " + contador + "/3";
                    }
                });

                // DIÁLOGO CON JONY
                if(camera.position.distanceTo(new THREE.Vector3(8, 0, -5)) < 3 && !yaHablo) {
                    yaHablo = true; hablando = true; controls.unlock();
                    boxD.style.display = 'block';
                    document.getElementById('texto-jony').innerText = "Jony: '¡Alejo! Qué bueno que viniste... che, tené cuidado con el Guardián Blanco, apareció de la nada en el pasillo central y se queda ahí, mirando fijo. No me animo a pasar.'";
                    document.getElementById('opciones-contenedor').innerHTML = "<button class='opcion-btn' onclick='cerrarD()'>Tranca Jony, yo me encargo.</button>";
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
