<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén de Chimbas - V2</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: black; color: white; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #contador-noche { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; }
        #tareas { position: absolute; top: 60px; left: 20px; font-size: 18px; color: #ffcc00; }
        #menu-dialogo { display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(0, 0, 0, 0.9); border: 2px solid #fff; padding: 20px; pointer-events: auto; text-align: center; }
        .opcion-btn { background: #444; color: white; border: 1px solid white; padding: 10px; margin: 5px; cursor: pointer; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: white; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.5; }
        #instrucciones { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="instrucciones">
        <h1>Almacén de Chimbas</h1>
        <p>W,A,S,D para moverte | SHIFT para agacharte | ESPACIO para saltar</p>
        <p>Click para interactuar con Jony o agarrar cajas</p>
        <button id="btn-jugar" style="padding: 10px 20px; cursor: pointer;">JUGAR</button>
    </div>

    <div id="ui-layer">
        <div id="contador-noche">Noche: 1 / 5</div>
        <div id="tareas">Tarea: Habla con Jony en el mostrador</div>
        <div id="crosshair"></div>
    </div>

    <div id="menu-dialogo">
        <div id="texto-dialogo"></div>
        <div id="opciones"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let nocheActual = 1;
        let cajasEncontradas = 0;
        let objetosInteractuables = [];
        let colisionables = [];
        let lucesTecho = [];
        let jony, maniqui;

        const clock = new THREE.Clock();

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, document.body);

            document.getElementById('btn-jugar').onclick = () => {
                controls.lock();
                document.getElementById('instrucciones').style.display = 'none';
            };

            crearAmbiente();
            crearLuces();
            crearPersonajes();
            animate();

            document.addEventListener('mousedown', interactuar);
        }

        function crearAmbiente() {
            // Suelo
            const suelo = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            suelo.rotation.x = -Math.PI / 2;
            scene.add(suelo);

            // Mostrador (Con Colisión)
            const mostrador = new THREE.Mesh(new THREE.BoxGeometry(4, 1.2, 1.5), new THREE.MeshStandardMaterial({ color: 0x5d4037 }));
            mostrador.position.set(0, 0.6, -2);
            scene.add(mostrador);
            colisionables.push(mostrador);

            // Alacenas laterales
            for(let i = 0; i < 3; i++) {
                const alacena = new THREE.Mesh(new THREE.BoxGeometry(1, 4, 3), new THREE.MeshStandardMaterial({ color: 0x222222 }));
                alacena.position.set(-8, 2, i * 5 - 5);
                scene.add(alacena);
                colisionables.push(alacena);
            }
        }

        function crearLuces() {
            // Luz ambiental base (siempre hay un poquito de luz)
            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambient);

            // Luces de techo (Se apagan en la Noche 5)
            const luz1 = new THREE.PointLight(0xffffff, 1, 20);
            luz1.position.set(0, 5, 0);
            scene.add(luz1);
            lucesTecho.push(luz1);

            const luz2 = new THREE.PointLight(0xffffff, 0.8, 20);
            luz2.position.set(0, 5, -10);
            scene.add(luz2);
            lucesTecho.push(luz2);

            // Linterna del jugador (empieza apagada o muy tenue)
            const linterna = new THREE.SpotLight(0xffffff, 1, 15, Math.PI/6);
            camera.add(linterna);
            linterna.position.set(0,0,0);
            linterna.target.position.set(0,0,-1);
            camera.add(linterna.target);
            scene.add(camera);
        }

        function crearPersonajes() {
            // Jony
            const jonyGeo = new THREE.BoxGeometry(0.8, 1.8, 0.5);
            jony = new THREE.Mesh(jonyGeo, new THREE.MeshStandardMaterial({ color: 0x0000ff }));
            jony.position.set(0, 0.9, -3.5); // Detrás del mostrador
            scene.add(jony);

            // Maniquí (Oculto al inicio)
            maniqui = new THREE.Mesh(new THREE.BoxGeometry(1, 2.2, 0.6), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            maniqui.position.set(-15, 1.1, -15);
            maniqui.visible = false;
            scene.add(maniqui);
        }

        function aparecerCajas() {
            for(let i = 0; i < 3; i++) {
                const caja = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
                caja.position.set(-7, 0.25, i * 4 - 4);
                caja.name = "caja_roja";
                scene.add(caja);
                objetosInteractuables.push(caja);
            }
        }

        function interactuar() {
            if (!controls.isLocked) return;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera({x: 0, y: 0}, camera);
            
            // Interactuar con Jony
            const interJony = raycaster.intersectObject(jony);
            if (interJony.length > 0 && interJony[0].distance < 3) {
                abrirMenuDialogo();
            }

            // Recoger cajas
            const interCajas = raycaster.intersectObjects(objetosInteractuables);
            if (interCajas.length > 0 && interCajas[0].distance < 3) {
                const obj = interCajas[0].object;
                if (obj.name === "caja_roja") {
                    scene.remove(obj);
                    cajasEncontradas++;
                    document.getElementById('tareas').innerText = `Tarea: Cajas ${cajasEncontradas}/3`;
                    if (cajasEncontradas === 3) {
                        document.getElementById('tareas').innerText = "Tarea: Vuelve con Jony";
                    }
                }
            }
        }

        function abrirMenuDialogo() {
            controls.unlock();
            const menu = document.getElementById('menu-dialogo');
            const texto = document.getElementById('texto-dialogo');
            const opciones = document.getElementById('opciones');
            menu.style.display = 'block';
            opciones.innerHTML = '';

            if (nocheActual < 5) {
                texto.innerText = "Jony: ¿Qué hacés Alejo? Che, buscame las 3 cajas rojas que están por las alacenas.";
                const btn = document.createElement('button');
                btn.innerText = "Dale, yo las busco";
                btn.className = "opcion-btn";
                btn.onclick = () => {
                    menu.style.display = 'none';
                    controls.lock();
                    aparecerCajas();
                    document.getElementById('tareas').innerText = "Tarea: Busca 3 cajas rojas";
                };
                opciones.appendChild(btn);

                const btnNoche = document.createElement('button');
                btnNoche.innerText = "[DEBUG] Siguiente Noche";
                btnNoche.onclick = saltarNoche;
                opciones.appendChild(btnNoche);
            }
        }

        function saltarNoche() {
            nocheActual++;
            document.getElementById('contador-noche').innerText = `Noche: ${nocheActual} / 5`;
            document.getElementById('menu-dialogo').style.display = 'none';
            controls.lock();

            if (nocheActual === 5) {
                // APAGÓN
                lucesTecho.forEach(l => l.intensity = 0);
                scene.remove(jony);
                maniqui.visible = true;
                maniqui.position.set(0, 1.1, -1.5); // Aparece donde estaba Jony
                document.getElementById('tareas').innerText = "Tarea: ESCAPA DEL ALMACÉN";
                document.getElementById('tareas').style.color = "red";
            }
        }

        // Lógica de Movimiento y Colisión
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveForward = true;
            if (e.code === 'KeyS') moveBackward = true;
            if (e.code === 'KeyA') moveLeft = true;
            if (e.code === 'KeyD') moveRight = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveForward = false;
            if (e.code === 'KeyS') moveBackward = false;
            if (e.code === 'KeyA') moveLeft = false;
            if (e.code === 'KeyD') moveRight = false;
        });

        function animate() {
            requestAnimationFrame(animate);
            
            if (controls.isLocked) {
                const delta = clock.getDelta();
                const v = 5 * delta;

                // Guardar posición anterior para colisión
                const oldPos = camera.position.clone();

                if (moveForward) controls.moveForward(v);
                if (moveBackward) controls.moveForward(-v);
                if (moveLeft) controls.moveRight(-v);
                if (moveRight) controls.moveRight(v);

                // Check Colisión simple (distancia a objetos colisionables)
                for (let obj of colisionables) {
                    if (camera.position.distanceTo(obj.position) < 1.5) {
                        camera.position.copy(oldPos);
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
