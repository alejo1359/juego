<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terror en Chimbas: El Turno de Alejo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 10; text-shadow: 2px 2px black; }
        #objetivo { position: absolute; bottom: 30px; left: 30px; font-size: 18px; background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #00ff00; }
        #subtitulos { position: absolute; bottom: 100px; width: 100%; text-align: center; font-size: 20px; color: #ffff00; padding: 0 50px; }
        #noche-info { position: absolute; top: 30px; right: 30px; font-size: 24px; color: #ff0000; font-weight: bold; }
        
        #menu-dialogo { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid white; padding: 20px; z-index: 2000; color: white;
            pointer-events: auto; width: 450px; box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }
        .opcion-btn { 
            display: block; width: 100%; background: none; color: white; border: 1px solid #555; 
            padding: 12px; margin: 10px 0; cursor: pointer; font-family: 'Courier New'; text-align: left; font-size: 14px;
        }
        .opcion-btn:hover { background: #222; border-color: #00ff00; color: #00ff00; }

        #pantalla-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #ff3333; padding: 50px; box-sizing: border-box; z-index: 1000; text-align: center; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="noche-info">NOCHE 1</div>
        <div id="objetivo">Objetivo: Habla con tu compañero Jony.</div>
        <div id="subtitulos"></div>
    </div>

    <div id="menu-dialogo">
        <p id="pregunta-jony" style="color: #00ff00; margin-bottom: 15px; font-weight: bold;"></p>
        <div id="contenedor-opciones"></div>
    </div>

    <div id="pantalla-final">
        <h1 style="border-bottom: 2px solid red;">DIARIO DE SAN JUAN - EDICIÓN CRÓNICA</h1>
        <div id="noticia-texto" style="font-size: 1.3em; max-width: 700px; margin: 40px auto; line-height: 1.6; text-align: left;"></div>
        <button onclick="location.reload()" style="background: red; color: white; border: none; padding: 10px 20px; cursor: pointer;">REINTENTAR TURNO</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        let noche = 1, misionPaso = 0, cajasRecogidas = 0, muerto = false, persiguiendo = false;
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 13); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const luzLocal = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2); 
        scene.add(luzLocal);

        const flashlight = new THREE.SpotLight(0xffffff, 0, 25, 0.4, 0.5);
        camera.add(flashlight);
        const lTarget = new THREE.Object3D();
        lTarget.position.set(0, 0, -5);
        camera.add(lTarget);
        flashlight.target = lTarget;
        scene.add(camera);

        const colisionables = [];
        function crearCaja(w, h, d, x, z, color = 0x444444, col = true) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({color: color}));
            m.position.set(x, h/2, z); scene.add(m);
            if(col) colisionables.push(new THREE.Box3().setFromObject(m));
            return m;
        }

        // Muros y estanterías
        crearCaja(26, 4, 1, 0, 16); crearCaja(26, 4, 1, 0, -16);
        crearCaja(1, 4, 32, -13, 0); crearCaja(1, 4, 32, 13, 0);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshPhongMaterial({color: 0x222222}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);
        const mostrador = crearCaja(4, 1.1, 2, -9, 11, 0x3d2b1f);
        for(let i=0; i<3; i++) {
            crearCaja(5, 2.8, 1.2, 7, 5 - (i*9), 0x222222);
            crearCaja(5, 2.8, 1.2, -7, 5 - (i*9), 0x222222);
        }

        const puntosSpawn = [{x: 0, z: 5}, {x: 0, z: -8}, {x: 8, z: 12}, {x: -8, z: -2}, {x: 0, z: -14}];
        const itemsMision = [];
        function spawnCajas() {
            itemsMision.forEach(c => scene.remove(c)); itemsMision.length = 0;
            puntosSpawn.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(p => {
                const c = crearCaja(0.7, 0.7, 0.7, p.x, p.z, 0x8b4513, false);
                itemsMision.push(c);
            });
        }
        spawnCajas();

        const jony = new THREE.Group();
        const jBody = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1.6), new THREE.MeshPhongMaterial({color: 0x2244aa}));
        const jHead = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshPhongMaterial({color: 0xffdbac}));
        jHead.position.y = 0.9; jony.add(jBody, jHead);
        jony.position.set(-8, 0.8, 9); scene.add(jony);

        const maniqui = new THREE.Group();
        const matM = new THREE.MeshPhongMaterial({color: 0xffffff, shininess: 100});
        const mTorso = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.7, 0.2), matM);
        const mHead = new THREE.Mesh(new THREE.SphereGeometry(0.2), matM); mHead.position.y = 0.5;
        const mLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.9), matM); mLeg.position.set(0.12, -0.8, 0);
        const mLegI = mLeg.clone(); mLegI.position.x = -0.12;
        const mArm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.8), matM); mArm.position.set(0.35, 0.1, 0);
        const mArmI = mArm.clone(); mArmI.position.x = -0.35;
        maniqui.add(mTorso, mHead, mLeg, mLegI, mArm, mArmI);
        maniqui.position.set(10, 1.8, -13); scene.add(maniqui);

        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => { 
            if(!muerto && document.getElementById('menu-dialogo').style.display !== 'block') controls.lock(); 
        });
        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function decir(txt) {
            document.getElementById('subtitulos').innerText = txt;
            setTimeout(() => { if(document.getElementById('subtitulos').innerText === txt) document.getElementById('subtitulos').innerText = ""; }, 4500);
        }

        const datosDialogo = {
            1: {
                pregunta: "Jony: ¡Hola Alejo! Linda noche para laburar, ¿no? No hay nadie en la calle.",
                opciones: [
                    { t: "Sí, ojalá terminemos temprano.", r: "Jony: Olvidate, hoy el jefe quiere que acomodemos todo el stock." },
                    { t: "¿Viste el partido ayer?", r: "Jony: ¡Qué amargo que sos! Casi me muero del embole." }
                ]
            },
            2: {
                pregunta: "Jony: Che, Alejo... ¿me prestás el cargador? Me quedé sin batería.",
                opciones: [
                    { t: "Lo dejé en la entrada, agarrlo.", r: "Jony: Joya, después te lo devuelvo. ¡A laburar!" },
                    { t: "No traje hoy, perdón.", r: "Jony: Bueno, no pasa nada. Estaré incomunicado toda la noche jaja." }
                ]
            },
            3: {
                pregunta: "Jony: Mañana es viernes, ¿sale ese asado en lo de Lucas?",
                opciones: [
                    { t: "De una, yo llevo la bebida.", r: "Jony: ¡Esa es la actitud! Ya le aviso por WhatsApp." },
                    { t: "No sé si llego con la plata.", r: "Jony: Dale che, no seas ortiva, yo te presto." }
                ]
            },
            4: {
                pregunta: "Jony: Alejo... escuché un ruido raro recién. Como si alguien caminara arriba.",
                opciones: [
                    { t: "Deben ser las ratas del techo.", r: "Jony: No sé... eran pasos pesados. Capaz el sereno de al lado." },
                    { t: "No escuché nada, estás loco.", r: "Jony: Capaz tenés razón... estoy cansado." }
                ]
            },
            5: {
                pregunta: "Jony: No me gusta nada esto. El maniquí blanco cambió de pose. Te juro que estaba con el brazo bajo.",
                opciones: [
                    { t: "Seguro lo movió el dueño.", r: "Jony: El dueño no vino en todo el día. Hay algo raro acá." },
                    { t: "Dejá de flashear, Jony.", r: "Jony: Miralo bien Alejo... parece que nos está siguiendo con la mirada." }
                ]
            },
            6: {
                pregunta: "Jony: Mirá, me voy. Mañana renuncio. Tengo un presentimiento horrible, Alejo. Vámonos los dos.",
                opciones: [
                    { t: "Por favor Jony, no me dejes solo la última noche. Mañana nos vamos juntos.", r: "Jony: ... (Suspirando) Está bien Alejo. Solo porque sos vos. Mañana es nuestro último turno." },
                    { t: "Quedate un rato más, falta poco para el aguinaldo.", r: "Jony: Tenés razón... pero si escucho un ruido más, me tomo el palo." }
                ]
            }
        };

        function mostrarMenuDialogo(n) {
            controls.unlock();
            const menu = document.getElementById('menu-dialogo');
            const pregunta = document.getElementById('pregunta-jony');
            const contenedor = document.getElementById('contenedor-opciones');
            
            pregunta.innerText = datosDialogo[n].pregunta;
            contenedor.innerHTML = "";
            
            datosDialogo[n].opciones.forEach(opc => {
                const btn = document.createElement('button');
                btn.className = "opcion-btn";
                btn.innerText = opc.t;
                btn.onclick = () => {
                    menu.style.display = 'none';
                    decir(opc.r);
                    misionPaso = 1;
                    document.getElementById('objetivo').innerText = "Objetivo: Recoge las 3 cajas.";
                    controls.lock();
                };
                contenedor.appendChild(btn);
            });
            menu.style.display = 'block';
        }

        function setNoche(n) {
            noche = n; misionPaso = 0; cajasRecogidas = 0;
            camera.position.set(0, 1.7, 13);
            document.getElementById('noche-info').innerText = `NOCHE ${n}`;
            document.getElementById('objetivo').innerText = "Objetivo: Habla con Jony.";
            spawnCajas();

            // El maniquí se acerca poco a poco a partir de la noche 4
            if(n === 4) maniqui.position.set(0, 1.8, -10);
            if(n === 5) maniqui.position.set(10, 1.8, 0);
            if(n === 6) maniqui.position.set(0, 1.8, 8);
            
            if(n === 7) {
                luzLocal.intensity = 0; 
                flashlight.intensity = 6; 
                scene.fog = new THREE.Fog(0x000000, 1, 10); 
                scene.remove(jony);
                // Escena del crimen
                crearCaja(0.2, 0.2, 0.8, -8.5, 9.5, 0x2244aa, false);
                crearCaja(0.2, 0.6, 0.2, -7.5, 9, 0xffdbac, false);
                crearCaja(2, 0.01, 2, -8, 9, 0x440000, false);
                maniqui.position.set(0, 1.8, -14);
                document.getElementById('objetivo').innerText = "Objetivo: ¿Jony? ¿Estás ahí?";
                decir("¡¿Jony?! Se cortó la luz... ¡Respondé!");
            }
        }

        function update() {
            requestAnimationFrame(update);
            if (!controls.isLocked || muerto) return;
            const oldPos = camera.position.clone();
            const speed = 0.15;
            if(keys['KeyW']) controls.moveForward(speed);
            if(keys['KeyS']) controls.moveForward(-speed);
            if(keys['KeyA']) controls.moveRight(-speed);
            if(keys['KeyD']) controls.moveRight(speed);

            const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.6, 1.8, 0.6));
            for(let box of colisionables) { if(pBox.intersectsBox(box)) camera.position.copy(oldPos); }

            const pPos = camera.position;

            if(noche < 7) {
                if(misionPaso === 0 && pPos.distanceTo(jony.position) < 2.5) {
                    mostrarMenuDialogo(noche);
                    misionPaso = -1;
                }
                if(misionPaso === 1) {
                    itemsMision.forEach((c, i) => {
                        if(pPos.distanceTo(c.position) < 2) {
                            scene.remove(c); itemsMision.splice(i, 1);
                            cajasRecogidas++; decir(`Cajas recogidas: ${cajasRecogidas}/3`);
                            if(cajasRecogidas === 3) {
                                document.getElementById('objetivo').innerText = "Objetivo: Sal por la puerta.";
                                misionPaso = 2;
                            }
                        }
                    });
                }
                if(misionPaso === 2 && pPos.z > 14) setNoche(noche + 1);
            } else {
                // NOCHE 7 FINAL
                if(misionPaso === 0 && pPos.distanceTo(new THREE.Vector3(-8, 1, 9)) < 2.5) {
                    decir("¡NO! ¡JONY NO! ¡LO MATÓ POR MI CULPA!");
                    misionPaso = 1; document.getElementById('objetivo').innerText = "¡HUYE!";
                }
                if(misionPaso === 1) {
                    const distM = pPos.distanceTo(maniqui.position);
                    if(distM < 12) persiguiendo = true;
                    if(persiguiendo) {
                        maniqui.position.x += (Math.random() - 0.5) * 0.15;
                        const d = new THREE.Vector3().subVectors(pPos, maniqui.position).normalize();
                        maniqui.position.addScaledVector(d, 0.16); // Un poco más rápido al final
                        maniqui.lookAt(pPos.x, 1.8, pPos.z);
                        if(distM < 1.3) { muerto = true; final(); }
                    }
                }
            }
            renderer.render(scene, camera);
        }

        function final() {
            controls.unlock();
            document.getElementById('pantalla-final').style.display = 'block';
            document.getElementById('noticia-texto').innerText = "CHIMBAS - El horror sacudió el local de la calle Mendoza. Jonathan fue hallado sin vida, convencido de quedarse una última noche por su compañero Alejo, quien ahora se encuentra desaparecido. Los vecinos dicen que de noche, las ropas del local parecen gritar.";
        }
        update();
    </script>
</body>
</html>
