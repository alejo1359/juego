<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén de Chimbas V44 - Escalera Visible</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 5; }
        #bloqueo { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; }
        #instrucciones { text-align: center; padding: 30px; border: 4px solid #ffcc00; background: #000; color: white; }
        
        #dialogo-box { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 650px; background: rgba(10,10,10,0.98); border: 3px solid #ffcc00;
            padding: 25px; display: none; pointer-events: auto; z-index: 500;
        }
        .opcion-btn {
            display: block; width: 100%; padding: 12px; margin-top: 12px;
            background: #1a1a1a; color: #ffcc00; border: 1px solid #ffcc00;
            cursor: pointer; text-align: left; font-family: 'Courier New', monospace;
        }
        .opcion-btn:hover { background: #ffcc00; color: #000; }
        #mision-ui { position: absolute; top: 20px; left: 20px; font-size: 1.2em; color: #ffcc00; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <div id="instrucciones">
            <h1 style="color: #ffcc00; margin-bottom: 15px;">ALMACÉN DE CHIMBAS</h1>
            <p style="font-size: 1.5em;">CLICK para ENTRAR</p>
            <p style="font-size: 0.9em; color: #aaa; margin-top:20px;">W,A,S,D: Caminar | ESPACIO: Saltar | SHIFT: Agacharse</p>
        </div>
    </div>

    <div id="ui">
        <div id="mision-ui">Cajas rojas: 0/3</div>
        <div id="dialogo-box">
            <p id="texto-jony" style="margin-bottom: 15px; font-weight: bold; color: #fff;"></p>
            <div id="opciones-contenedor"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.FogExp2(0x000000, 0.08);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(luzAmbiente);
        const linterna = new THREE.SpotLight(0xffffff, 8, 40, 0.5, 0.2);
        camera.add(linterna);
        camera.add(linterna.target);
        linterna.target.position.z = -5;
        scene.add(camera);

        const colisiones = [];
        function crearCaja(w, h, d, x, y, z, color = 0x1a1a1a) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshBasicMaterial({ color: color }));
            mesh.position.set(x, y, z);
            scene.add(mesh);
            colisiones.push(new THREE.Box3().setFromObject(mesh));
        }

        // --- MAPA ---
        crearCaja(40, 0.1, 40, 0, 0, 0, 0x111111); // Suelo
        crearCaja(40, 6, 1, 0, 3, -20); // Paredes
        crearCaja(40, 6, 1, 0, 3, 20);
        crearCaja(1, 6, 40, -20, 3, 0);
        crearCaja(1, 6, 40, 20, 3, 0);

        const mesaPos = {x: 8, y: 0.5, z: -5};
        crearCaja(4, 1.2, 2.5, mesaPos.x, mesaPos.y, mesaPos.z, 0x4e342e);

        // Alacenas
        for(let i=0; i<3; i++) {
            crearCaja(8, 4, 2, -10, 2, -10 + (i*10), 0x222222);
        }

        // --- SÓTANO Y ESCALERA AMARILLA (NUEVA POSICIÓN) ---
        const sotanoPos = {x: 15, y: -5, z: 5}; 
        crearCaja(12, 0.1, 12, sotanoPos.x, sotanoPos.y, sotanoPos.z, 0x050505);
        
        // Escalones amarillos brillantes
        for(let i=0; i<10; i++) {
            const esc = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 0.8), new THREE.MeshBasicMaterial({color: 0xffcc00}));
            esc.position.set(sotanoPos.x, -i*0.5, sotanoPos.z - 4 + (i*0.7));
            scene.add(esc);
        }

        // Luz de guía en la escalera
        const luzEsq = new THREE.PointLight(0xffcc00, 1, 8);
        luzEsq.position.set(sotanoPos.x, 1, sotanoPos.z - 4);
        scene.add(luzEsq);

        // --- CAJAS MISIÓN ---
        const cajasMision = [];
        let contador = 0;
        function nuevaCaja(x, y, z) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshBasicMaterial({color: 0xff0000}));
            mesh.position.set(x, y, z);
            scene.add(mesh);
            cajasMision.push(mesh);
        }
        nuevaCaja(-15, 0.3, -10); nuevaCaja(15, -4.7, 7); nuevaCaja(-12, 0.3, 10);

        // --- DIÁLOGOS ---
        let hablando = false;
        let yaHablo = false;
        const boxDialogo = document.getElementById('dialogo-box');
        const textoJony = document.getElementById('texto-jony');
        const opcionesCont = document.getElementById('opciones-contenedor');

        function mostrarDialogo() {
            hablando = true; controls.unlock();
            boxDialogo.style.display = 'block';
            textoJony.innerText = "Jony: '¡Alejo! Che, qué suerte que estás. Me olvidé las cajas de herramientas por ahí. ¿Ves la escalera amarilla nueva? Fijate si alguna quedó abajo, yo ni loco bajo con esta oscuridad.'";
            opcionesCont.innerHTML = "<button class='opcion-btn' onclick='cerrarDialogo()'>No pasa nada Jony, ahí las busco.</button>";
        }
        window.cerrarDialogo = () => { hablando = false; boxDialogo.style.display = 'none'; controls.lock(); };

        // --- JONY ---
        let jony, mixer;
        const loader = new GLTFLoader();
        loader.load("https://cdn.pixabay.com/download/objects3d/2025/07/17/processed_1161__c5db61fbe5.glb?filename=quaternius_cc0-male-character-1161.glb", (gltf) => {
            jony = gltf.scene; jony.scale.set(0.5, 0.5, 0.5);
            jony.position.set(mesaPos.x, 0, mesaPos.z - 1.2);
            jony.rotation.y = Math.PI * 0.7;
            scene.add(jony);
            mixer = new THREE.AnimationMixer(jony);
            const idle = THREE.AnimationClip.findByName(gltf.animations, 'Idle');
            if(idle) mixer.clipAction(idle).play();
        });

        // --- MOVIMIENTO Y FÍSICAS ---
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('bloqueo').addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => { document.getElementById('bloqueo').style.display = 'none'; });
        controls.addEventListener('unlock', () => { if(!hablando) document.getElementById('bloqueo').style.display = 'flex'; });

        const keys = {};
        let velY = 0; let enSuelo = true; let agachado = false;
        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true;
            if(e.code === 'Space' && enSuelo && !hablando) velY = 0.15;
            if(e.code === 'ShiftLeft') agachado = true;
        });
        document.addEventListener('keyup', (e) => { 
            keys[e.code] = false;
            if(e.code === 'ShiftLeft') agachado = false;
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if(mixer) mixer.update(delta);

            if (controls.isLocked && !hablando) {
                const posAnt = camera.position.clone();
                let spd = agachado ? 0.07 : 0.13;
                if(keys['KeyW']) controls.moveForward(spd);
                if(keys['KeyS']) controls.moveForward(-spd);
                if(keys['KeyA']) controls.moveRight(-spd);
                if(keys['KeyD']) controls.moveRight(spd);

                // GRAVEDAD Y ESCALERA
                camera.position.y += velY; velY -= 0.008;
                let sueloY = 1.7;
                
                // Zona de la escalera amarilla
                const distEsc = camera.position.distanceTo(new THREE.Vector3(sotanoPos.x, camera.position.y, sotanoPos.z));
                if(distEsc < 5) {
                    let t = Math.min(1, Math.max(0, (camera.position.z - (sotanoPos.z - 4)) / 6));
                    sueloY = THREE.MathUtils.lerp(1.7, -3.3, t);
                } else if (camera.position.z > sotanoPos.z && Math.abs(camera.position.x - sotanoPos.x) < 5) {
                    sueloY = -3.3;
                }
                
                if(agachado) sueloY -= 0.8;
                if(camera.position.y < sueloY) { camera.position.y = sueloY; velY = 0; enSuelo = true; } else { enSuelo = false; }

                // COLISIONES
                const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.8, 1, 0.8));
                colisiones.forEach(b => { if(pBox.intersectsBox(b)) camera.position.copy(posAnt); });
                
                // RECOLECCIÓN
                cajasMision.forEach(c => {
                    if(c.visible && camera.position.distanceTo(c.position) < 1.5) {
                        c.visible = false; contador++;
                        document.getElementById('mision-ui').innerText = "Cajas rojas: " + contador + "/3";
                    }
                });

                if(camera.position.distanceTo(new THREE.Vector3(mesaPos.x, 0, mesaPos.z)) < 3 && !yaHablo) {
                    yaHablo = true; mostrarDialogo();
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
