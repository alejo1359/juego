<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén de Chimbas V39 - Diálogos y Colisiones</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 5; }
        #bloqueo { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; cursor: pointer; }
        #instrucciones { text-align: center; padding: 30px; border: 4px solid #ff0000; background: #000; }
        
        /* ESTILO DIÁLOGO V39 */
        #dialogo-box { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 600px; background: rgba(0,0,0,0.9); border: 3px solid #00ff00;
            padding: 20px; display: none; pointer-events: auto; z-index: 10;
        }
        .opcion-btn {
            display: block; width: 100%; padding: 10px; margin-top: 10px;
            background: #222; color: #00ff00; border: 1px solid #00ff00;
            cursor: pointer; text-align: left; font-family: 'Courier New', monospace;
        }
        .opcion-btn:hover { background: #00ff00; color: #000; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <div id="instrucciones">
            <h1 style="color: red; margin-bottom: 15px;">ALMACÉN DE CHIMBAS</h1>
            <p>CLICK para EMPEZAR</p>
        </div>
    </div>

    <div id="ui">
        <div id="dialogo-box">
            <p id="texto-jony" style="margin-bottom: 15px; font-weight: bold;"></p>
            <div id="opciones-contenedor"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.FogExp2(0x000000, 0.08);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(luzAmbiente);
        const linterna = new THREE.SpotLight(0xffffff, 6, 35, 0.5, 0.2);
        camera.add(linterna);
        camera.add(linterna.target);
        linterna.target.position.z = -5;
        scene.add(camera);

        // --- CAJAS DE COLISIÓN ---
        const objetosColision = [];
        function crearCaja(w, h, d, x, y, z, color = 0x1a1a1a, invisible = false) {
            const geom = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshBasicMaterial({ color: color, transparent: invisible, opacity: invisible ? 0 : 1 });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            
            const box = new THREE.Box3().setFromObject(mesh);
            objetosColision.push(box);
            return mesh;
        }

        // Suelo y Límites
        const piso = new THREE.Mesh(new THREE.PlaneGeometry(35, 35), new THREE.MeshBasicMaterial({color: 0x111111}));
        piso.rotation.x = -Math.PI / 2;
        scene.add(piso);

        // Paredes
        crearCaja(35, 6, 1, 0, 3, -16); // Fondo
        crearCaja(35, 6, 1, 0, 3, 16);  // Frente
        crearCaja(1, 6, 35, -16, 3, 0); // Izquierda
        crearCaja(1, 6, 35, 16, 3, 0);  // Derecha

        // Alacenas con colisión
        for(let i=0; i<3; i++) {
            crearCaja(8, 4, 1.5, -8, 2, -10 + (i*8), 0x222222);
        }

        // Mesa de Jony con colisión
        const mesaMesh = crearCaja(4, 1, 2, 5, 0.5, -5, 0x4e342e);

        // --- EL SÓTANO ---
        const sótanoX = 12, sótanoZ = 10;
        const pisoSótano = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), new THREE.MeshBasicMaterial({color: 0x0a0000}));
        pisoSótano.rotation.x = -Math.PI / 2;
        pisoSótano.position.set(sótanoX, -5, sótanoZ);
        scene.add(pisoSótano);

        for(let i=0; i<10; i++) {
            const esc = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 0.8), new THREE.MeshBasicMaterial({color: 0x880000}));
            esc.position.set(sótanoX, -i*0.5, sótanoZ - 4 + (i*0.6));
            scene.add(esc);
        }

        // --- LÓGICA DE DIÁLOGO ---
        let hablando = false;
        const boxDialogo = document.getElementById('dialogo-box');
        const textoJony = document.getElementById('texto-jony');
        const opcionesCont = document.getElementById('opciones-contenedor');

        const dialogoDatos = {
            inicio: {
                texto: "Jony: '¿Qué hacés acá a esta hora, Alejo? Está por cerrar...'",
                opciones: [
                    { texto: "Busco los percheros verdes.", siguiente: "mision" },
                    { texto: "¿Qué hay en el sótano?", siguiente: "sotano" },
                    { texto: "Mejor me voy.", siguiente: "cerrar" }
                ]
            },
            mision: {
                texto: "Jony: 'Ah, están en las alacenas del fondo. Traelos rápido.'",
                opciones: [{ texto: "Entendido.", siguiente: "cerrar" }]
            },
            sotano: {
                texto: "Jony: 'No bajés ahí... el maniquí se pone raro en la oscuridad.'",
                opciones: [{ texto: "Voy a echar un ojo igual.", siguiente: "cerrar" }]
            },
            cerrar: { texto: "", opciones: [] }
        };

        function mostrarDialogo(clave) {
            const data = dialogoDatos[clave];
            if (!data.texto) { 
                hablando = false; 
                boxDialogo.style.display = 'none'; 
                controls.lock(); 
                return; 
            }
            hablando = true;
            controls.unlock();
            boxDialogo.style.display = 'block';
            textoJony.innerText = data.texto;
            opcionesCont.innerHTML = "";
            data.opciones.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "opcion-btn";
                btn.innerText = opt.texto;
                btn.onclick = () => mostrarDialogo(opt.siguiente);
                opcionesCont.appendChild(btn);
            });
        }

        // --- MODELOS ---
        let jony, maniqui, mixer;
        const loader = new GLTFLoader();
        loader.load("https://cdn.pixabay.com/download/objects3d/2025/07/17/processed_1161__c5db61fbe5.glb?filename=quaternius_cc0-male-character-1161.glb", (gltf) => {
            jony = gltf.scene;
            jony.scale.set(0.5, 0.5, 0.5);
            jony.position.set(5, 0, -5.8);
            jony.rotation.y = Math.PI;
            scene.add(jony);
            mixer = new THREE.AnimationMixer(jony);
            const idle = THREE.AnimationClip.findByName(gltf.animations, 'Idle');
            if(idle) mixer.clipAction(idle).play();

            maniqui = jony.clone();
            maniqui.scale.set(0.7, 0.7, 0.7);
            maniqui.position.set(-8, 0, 8);
            maniqui.traverse(n => { if(n.isMesh) n.material = new THREE.MeshBasicMaterial({color:0xffffff}); });
            scene.add(maniqui);
        });

        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('bloqueo').addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => document.getElementById('bloqueo').style.display = 'none');
        controls.addEventListener('unlock', () => { if(!hablando) document.getElementById('bloqueo').style.display = 'flex'; });

        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if(mixer) mixer.update(delta);

            if (controls.isLocked && !hablando) {
                const anteriorPos = camera.position.clone();
                const spd = 0.12;
                if(keys['KeyW']) controls.moveForward(spd);
                if(keys['KeyS']) controls.moveForward(-spd);
                if(keys['KeyA']) controls.moveRight(-spd);
                if(keys['KeyD']) controls.moveRight(spd);

                // Colisiones
                const playerBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.8, 2, 0.8));
                for(let box of objetosColision) {
                    if(playerBox.intersectsBox(box)) {
                        camera.position.copy(anteriorPos);
                    }
                }

                // Escalera / Altura
                const distEscalera = camera.position.distanceTo(new THREE.Vector3(sótanoX, 0, sótanoZ));
                if (distEscalera < 4.5) {
                    if(camera.position.y > -3.3) camera.position.y -= 0.08;
                } else {
                    if(camera.position.y < 1.7) camera.position.y += 0.1;
                }

                // Activar Diálogo con Jony
                if(camera.position.distanceTo(new THREE.Vector3(5,0,-5)) < 3) {
                    mostrarDialogo('inicio');
                }

                if(maniqui) maniqui.lookAt(camera.position.x, 0, camera.position.z);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
