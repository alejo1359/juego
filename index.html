<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén de Chimbas V49 - Guardián Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 5; }
        #bloqueo { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; }
        #mision-ui { position: absolute; top: 20px; left: 20px; font-size: 1.2em; color: #ffcc00; }
    </style>
</head>
<body>

    <div id="bloqueo" onclick="iniciar()">
        <div style="border: 4px solid #ffcc00; padding: 40px; background: #000; text-align: center;">
            <h1 style="color: #ffcc00;">ALMACÉN DE CHIMBAS</h1>
            <p style="color: white; font-size: 1.5em; margin: 20px 0;">CLICK PARA VER AL GUARDIÁN</p>
        </div>
    </div>

    <div id="ui">
        <div id="mision-ui">Cajas Rojas: 0/3</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 1.5, 50);
        camera.add(light);
        scene.add(camera);

        const colisiones = [];
        function box(w, h, d, x, y, z, color=0x222222) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshBasicMaterial({color}));
            m.position.set(x,y,z); scene.add(m);
            colisiones.push(new THREE.Box3().setFromObject(m));
            return m;
        }

        // --- MAPA ---
        box(40, 0.1, 40, 0, 0, 0, 0x111111); // Suelo
        box(4, 1.2, 2.5, 8, 0.6, -5, 0x4e342e); // Mesa Jony

        // --- CARGA DE PERSONAJES ---
        const loader = new GLTFLoader();
        let mixerG;

        // Jony
        loader.load("https://cdn.pixabay.com/download/objects3d/2025/07/17/processed_1161__c5db61fbe5.glb?filename=quaternius_cc0-male-character-1161.glb", (g) => {
            const jony = g.scene; jony.scale.set(0.5, 0.5, 0.5); jony.position.set(8, 0, -6.5);
            jony.rotation.y = Math.PI * 0.7; scene.add(jony);
        });

        // EL GUARDIÁN BLANCO (Link Directo Corregido)
        const matBlanco = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
        
        loader.load("https://cdn.jsdelivr.net/gh/quaternius/hosting@master/male-character-1352.glb", (g) => {
            const guardian = g.scene;
            guardian.scale.set(0.6, 0.6, 0.6);
            guardian.position.set(6, 0, -4); // PUESTO BIEN CERCA DE JONY PARA QUE LO VEAS
            guardian.rotation.y = Math.PI * -0.5;
            
            guardian.traverse(n => {
                if(n.isMesh) {
                    n.material = matBlanco;
                    if(n.name.includes("Extra")) n.visible = false;
                }
            });
            
            scene.add(guardian);
            mixerG = new THREE.AnimationMixer(guardian);
            if(g.animations.length > 0) mixerG.clipAction(g.animations[0]).play();
        });

        // --- CONTROLES ---
        const controls = new PointerLockControls(camera, document.body);
        window.iniciar = () => { document.getElementById('bloqueo').style.display='none'; controls.lock(); };

        const keys = {};
        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            if(mixerG) mixerG.update(0.016);
            if(controls.isLocked) {
                let spd = 0.12;
                if(keys['KeyW']) controls.moveForward(spd);
                if(keys['KeyS']) controls.moveForward(-spd);
                if(keys['KeyA']) controls.moveRight(-spd);
                if(keys['KeyD']) controls.moveRight(spd);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
