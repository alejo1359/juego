<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén de Chimbas V48 - El Guardián Real</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 5; }
        #bloqueo { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; }
        #instrucciones { text-align: center; padding: 30px; border: 4px solid #ffcc00; background: #000; color: white; }
        #mision-ui { position: absolute; top: 20px; left: 20px; font-size: 1.2em; color: #ffcc00; text-shadow: 2px 2px #000; }
        #dialogo-box { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 650px; background: rgba(10,10,10,0.98); border: 2px solid #ffcc00; padding: 25px; display: none; pointer-events: auto; z-index: 500; }
        .opcion-btn { display: block; width: 100%; padding: 12px; margin-top: 12px; background: #1a1a1a; color: #ffcc00; border: 1px solid #ffcc00; cursor: pointer; text-align: left; font-family: 'Courier New', monospace; }
        .opcion-btn:hover { background: #ffcc00; color: #000; }
    </style>
</head>
<body>

    <div id="bloqueo" onclick="iniciar()">
        <div id="instrucciones">
            <h1 style="color: #ffcc00; margin-bottom: 20px;">ALMACÉN DE CHIMBAS V48</h1>
            <p style="font-size: 1.8em; color: white;">CLICK PARA ENTRAR</p>
            <p style="font-size: 0.9em; color: #aaa; margin-top:25px;">W,A,S,D: Caminar | ESPACIO: Saltar | SHIFT: Agacharse</p>
        </div>
    </div>

    <div id="ui">
        <div id="mision-ui">Cajas Rojas: 0/3</div>
        <div id="dialogo-box">
            <p id="txt-jony" style="color: white; margin-bottom: 15px; font-weight: bold; font-size: 1.1em;"></p>
            <button class="opcion-btn" onclick="cerrarD()">[Terminar Diálogo]</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.FogExp2(0x000000, 0.08);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(luzAmbiente);
        const linterna = new THREE.SpotLight(0xffffff, 8, 30, 0.6, 0.2);
        camera.add(linterna);
        camera.add(linterna.target);
        linterna.target.position.z = -5;
        scene.add(camera);

        const colisiones = [];
        function box(w, h, d, x, y, z, color=0x1a1a1a, invisible=false) {
            const geom = new THREE.BoxGeometry(w,h,d);
            const mat = new THREE.MeshBasicMaterial({color: color, transparent: invisible, opacity: invisible ? 0 : 1});
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x,y,z);
            scene.add(mesh);
            if(!invisible) colisiones.push(new THREE.Box3().setFromObject(mesh));
            return mesh;
        }

        // --- MAPA ---
        box(40, 0.1, 40, 0, 0, 0, 0x111111); // Suelo
        box(40, 8, 1, 0, 4, -20); box(40, 8, 1, 0, 4, 20); // Paredes
        box(1, 8, 40, -20, 4, 0); box(1, 8, 40, 20, 4, 0);

        box(4, 1.2, 2.5, 8, 0.5, -5, 0x4e342e); // Mesa Jony
        for(let i=0; i<3; i++) box(8, 4, 2, -10, 2, -10 + (i*10), 0x222222); // Alacenas

        // --- SÓTANO Y ESCALERA MEJORADA ---
        const sotanoPos = {x: 15, y: -7, z: 0};
        box(10, 0.1, 10, sotanoPos.x, sotanoPos.y, sotanoPos.z, 0x0a0a0a); // Suelo sótano
        box(10, 8, 0.5, sotanoPos.x, sotanoPos.y+4, sotanoPos.z-5); // Paredes sótano
        box(10, 8, 0.5, sotanoPos.x, sotanoPos.y+4, sotanoPos.z+5);
        box(0.5, 8, 10, sotanoPos.x+5, sotanoPos.y+4, sotanoPos.z);
        
        // LA ESCALERA (Caños amarillos)
        for(let i=0; i<15; i++) {
            const peldaño = box(2.5, 0.15, 0.15, sotanoPos.x-5.8, sotanoPos.y + (i*0.65), sotanoPos.z, 0xcccc00);
        }

        // --- PERSONAJES ---
        const loader = new GLTFLoader();
        let jony, guardian, mixerJ, mixerG;

        // Jony (Modelo original CC0)
        loader.load("https://cdn.pixabay.com/download/objects3d/2025/07/17/processed_1161__c5db61fbe5.glb?filename=quaternius_cc0-male-character-1161.glb", (g) => {
            jony = g.scene; jony.scale.set(0.5, 0.5, 0.5); jony.position.set(8, 0, -6.2);
            jony.rotation.y = Math.PI * 0.7; scene.add(jony);
            mixerJ = new THREE.AnimationMixer(jony);
            mixerJ.clipAction(g.animations[0]).play(); // Idle
        });

        // EL GUARDIÁN BLANCO REAL (Nuevo Modelo de Alejo V48)
        // Usamos material blanco puro brillante
        const matBlancoPuro = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        loader.load("https://raw.githubusercontent.com/Juan-Alejo-Desarrollo/Alejo-Juego-GitHub/main/quaternius_cc0-male-character-1352.glb", (g) => {
            guardian = g.scene;
            guardian.scale.set(0.6, 0.6, 0.6); // Un poco más alto
            guardian.position.set(2, 0, 0); // Parado en el pasillo central, vigilando
            
            // Forzar material blanco puro a TODO el modelo (cuerpo, ropa, etc)
            guardian.traverse((child) => {
                if (child.isMesh) {
                    child.material = matBlancoPuro;
                    // Sacar gorros o mochilas si las tiene
                    if(child.name.includes("Extra")) child.visible = false; 
                }
            });
            
            scene.add(guardian);
            
            mixerG = new THREE.AnimationMixer(guardian);
            // Reproducir Idle (animación de respiración)
            if(g.animations.length > 0) {
                mixerG.clipAction(g.animations[0]).play(); 
            }
        });

        // --- LÓGICA MISIÓN ---
        const controles = new PointerLockControls(camera, document.body);
        window.iniciar = () => { document.getElementById('bloqueo').style.display='none'; controles.lock(); };
        window.cerrarD = () => { document.getElementById('dialogo-box').style.display='none'; controles.lock(); };

        const cajas = []; let puntos = 0;
        function nCaja(x,y,z) { const c = box(0.6, 0.6, 0.6, x, y, z, 0xff0000); cajas.push(c); }
        nCaja(-10, 0.5, -10); nCaja(sotanoPos.x+2, sotanoPos.y+0.5, sotanoPos.z+2); nCaja(-12, 0.5, 12);

        // --- MOVIMIENTO ---
        const keys = {};
        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);

        let velY = 0; let yaHablo = false;
        function animate() {
            requestAnimationFrame(animate);
            const delta = 0.016;
            if(mixerJ) mixerJ.update(delta);
            if(mixerG) mixerG.update(delta);

            if(controles.isLocked) {
                const prev = camera.position.clone();
                let spd = keys['ShiftLeft'] ? 0.07 : 0.14;
                if(keys['KeyW']) controles.moveForward(spd);
                if(keys['KeyS']) controles.moveForward(-spd);
                if(keys['KeyA']) controles.moveRight(-spd);
                if(keys['KeyD']) controles.moveRight(spd);

                // Gravedad básica
                camera.position.y += velY; velY -= 0.008;

                // Suelo Inteligente
                let ground = 1.7;
                
                // Si estás sobre el hueco del sótano
                if (camera.position.x > sotanoPos.x-3 && camera.position.x < sotanoPos.x+3 && camera.position.z > sotanoPos.z-3 && camera.position.z < sotanoPos.z+3) {
                    ground = -100; // Caen
                }
                // Si estás dentro de los límites del sótano abajo
                if (camera.position.x > sotanoPos.x-5 && camera.position.x < sotanoPos.x+5 && camera.position.z > sotanoPos.z-5 && camera.position.z < sotanoPos.z+5 && camera.position.y < -2) {
                    ground = sotanoPos.y + 1.7;
                }

                if(camera.position.y < ground) { camera.position.y = ground; velY = 0; }

                // ESCALERA DE MANO (Lógica de subida)
                const distEsc = camera.position.distanceTo(new THREE.Vector3(sotanoPos.x-5, camera.position.y, sotanoPos.z));
                if(distEsc < 1.6) {
                    if(keys['KeyW']) { camera.position.y += 0.15; velY = 0; }
                }

                // Colisiones paredes
                const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.8, 1, 0.8));
                for(let b of colisiones) { if(pBox.intersectsBox(b)) camera.position.copy(prev); }

                // Cajas
                cajas.forEach(c => {
                    if(c.visible && camera.position.distanceTo(c.position) < 1.5) {
                        c.visible = false; puntos++;
                        document.getElementById('mision-ui').innerText = "Cajas Rojas: " + puntos + "/3";
                    }
                });

                // Diálogo Jony
                if(camera.position.distanceTo(new THREE.Vector3(8, 0, -5)) < 2.5 && !yaHablo) {
                    yaHablo = true;
                    document.getElementById('dialogo-box').style.display='block';
                    document.getElementById('txt-jony').innerText = "Jony: '¡Alejo! Che, qué bueno que viniste... tené cuidado con el Guardián Blanco, apareció de la nada en el pasillo y se queda ahí, mirando fijo. No me animo a pasar.'";
                    controles.unlock();
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
