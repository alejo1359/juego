<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén de Chimbas V37 - Luz y Espacio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; user-select: none; }
        canvas { display: block; width: 100% !important; height: 100% !important; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 5; }
        #bloqueo { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; cursor: pointer; }
        #instrucciones { text-align: center; padding: 30px; border: 4px solid #ff0000; background: #000; box-shadow: 0 0 20px rgba(255,0,0,0.5); }
        #objetivo { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-left: 5px solid #00ff00; max-width: 350px; font-size: 1.1em; }
        #contador { position: absolute; top: 20px; right: 20px; font-size: 1.5em; color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div id="bloqueo">
        <div id="instrucciones">
            <h1 style="color: red; margin-bottom: 15px;">TURNO DE NOCHE - NOCHE 1</h1>
            <p style="font-size: 1.2em;">CLICK para EMPEZAR</p>
            <p style="font-size: 0.8em; color: #aaa; margin-top: 20px;">W,A,S,D: Movimiento | MOUSE: Mirar</p>
        </div>
    </div>

    <div id="ui">
        <div id="contador">Percheros: 0/3</div>
        <div id="objetivo">Objetivo: Hablá con Jony en la mesa.</div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.FogExp2(0x000000, 0.08); // Menos niebla para ver mejor

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        // --- ILUMINACIÓN REFORZADA V37 ---
        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.6); // Luz general más fuerte
        scene.add(luzAmbiente);

        const linterna = new THREE.SpotLight(0xffffff, 6, 40, 0.5, 0.2); // Linterna muy brillante
        camera.add(linterna);
        camera.add(linterna.target);
        linterna.target.position.z = -5;
        scene.add(camera);

        // --- LA TIENDA COMPACTA ---
        const piso = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshBasicMaterial({color: 0x111111}));
        piso.rotation.x = -Math.PI / 2;
        scene.add(piso);

        // Mesa de Jony (Más cerca)
        const mesa = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 1), new THREE.MeshBasicMaterial({color: 0x4e342e}));
        mesa.position.set(0, 0.5, -4);
        scene.add(mesa);

        // Alacenas alineadas (Solo dos filas cortas)
        const matAlacena = new THREE.MeshBasicMaterial({color: 0x222222});
        for(let i=0; i<2; i++) {
            for(let j=0; j<3; j++) {
                const alacena = new THREE.Mesh(new THREE.BoxGeometry(1.5, 4, 1), matAlacena);
                alacena.position.set(-6 + (i*12), 2, -10 - (j*5));
                scene.add(alacena);
            }
        }

        // Sótano (Más cerca, al fondo a la derecha)
        const sótanoX = 10, sótanoZ = -15;
        const hueco = new THREE.Mesh(new THREE.PlaneGeometry(3, 5), new THREE.MeshBasicMaterial({color: 0x000000}));
        hueco.rotation.x = -Math.PI / 2;
        hueco.position.set(sótanoX, 0.01, sótanoZ);
        scene.add(hueco);

        const matEscalón = new THREE.MeshBasicMaterial({color: 0xff0000}); // Rojo brillante
        for(let i=0; i<8; i++) {
            const escalón = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 0.4), matEscalón);
            escalón.position.set(sótanoX, -i*0.4, sótanoZ - 2 + i*0.5);
            scene.add(escalón);
        }

        // --- OBJETOS ---
        const percheros = [];
        let recolectados = 0;
        const posPercheros = [[-5, 0.8, -12], [8, 0.8, -10], [0, 0.8, -20]];
        posPercheros.forEach((pos) => {
            const p = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.1), new THREE.MeshBasicMaterial({color: 0x00ff00}));
            p.position.set(pos[0], pos[1], pos[2]);
            scene.add(p);
            percheros.push(p);
        });

        let jony, maniqui, mixer;
        const clock = new THREE.Clock();
        const loader = new GLTFLoader();
        const urlJony = "https://cdn.pixabay.com/download/objects3d/2025/07/17/processed_1161__c5db61fbe5.glb?filename=quaternius_cc0-male-character-1161.glb";

        loader.load(urlJony, (gltf) => {
            jony = gltf.scene;
            jony.scale.set(0.5, 0.5, 0.5);
            jony.position.set(0, 0, -4.6);
            jony.rotation.y = Math.PI;
            scene.add(jony);

            mixer = new THREE.AnimationMixer(jony);
            const idle = THREE.AnimationClip.findByName(gltf.animations, 'Idle');
            if(idle) mixer.clipAction(idle).play();

            maniqui = jony.clone();
            maniqui.scale.set(0.7, 0.7, 0.7);
            maniqui.position.set(5, 0, -6);
            maniqui.traverse((n) => {
                if (n.isMesh) {
                    n.material = new THREE.MeshBasicMaterial({color: 0xffffff});
                    if(n.name.includes("Extra")) n.visible = false;
                }
            });
            scene.add(maniqui);
        });

        const controls = new PointerLockControls(camera, document.body);
        const bloqueoUI = document.getElementById('bloqueo');
        bloqueoUI.addEventListener('click', () => { controls.lock(); });
        controls.addEventListener('lock', () => { bloqueoUI.style.display = 'none'; });
        controls.addEventListener('unlock', () => { bloqueoUI.style.display = 'flex'; });

        const keys = {};
        camera.position.set(0, 1.7, 3);

        document.addEventListener('keydown', (e) => { keys[e.code] = true; });
        document.addEventListener('keyup', (e) => { keys[e.code] = false; });

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if(mixer) mixer.update(delta);
            if (controls.isLocked) {
                const spd = 0.12;
                if(keys['KeyW']) controls.moveForward(spd);
                if(keys['KeyS']) controls.moveForward(-spd);
                if(keys['KeyA']) controls.moveRight(-spd);
                if(keys['KeyD']) controls.moveRight(spd);
                camera.position.y = 1.7;

                if(jony && camera.position.distanceTo(jony.position) < 2.5) {
                    document.getElementById('objetivo').innerText = "Jony: '¡No te quedes ahí, juntá los percheros!'";
                }

                percheros.forEach((p) => {
                    if(p.visible && camera.position.distanceTo(p.position) < 1.4) {
                        p.visible = false;
                        recolectados++;
                        document.getElementById('contador').innerText = "Percheros: " + recolectados + "/3";
                    }
                });

                if(maniqui) maniqui.lookAt(camera.position.x, 0, camera.position.z);
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
