<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terror en Chimbas: 10 Noches</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 10; text-shadow: 2px 2px black; display: none; }
        #objetivo { position: absolute; bottom: 30px; left: 30px; font-size: 18px; background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #ff0000; }
        #subtitulos { position: absolute; bottom: 100px; width: 100%; text-align: center; font-size: 20px; color: #ffff00; padding: 0 50px; }
        #noche-info { position: absolute; top: 30px; right: 30px; font-size: 28px; color: #ff0000; font-weight: bold; }
        
        /* BATERÍA */
        #battery-ui { position: absolute; top: 30px; left: 30px; font-size: 14px; }
        #battery-bar-container { width: 150px; height: 10px; background: #333; border: 1px solid #fff; margin-top: 5px; }
        #battery-bar { width: 100%; height: 100%; background: #00ff00; }

        #menu-inicio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #1a0000 0%, #000000 100%);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; text-align: center;
        }
        #btn-jugar { 
            padding: 15px 40px; font-size: 20px; background: #ff0000; color: white; border: none; cursor: pointer; 
            font-family: 'Courier New'; margin-top: 20px; box-shadow: 0 0 15px red;
        }

        #menu-dialogo { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid white; padding: 20px; z-index: 2000; color: white;
            pointer-events: auto; width: 450px;
        }
        .opcion-btn { display: block; width: 100%; background: none; color: white; border: 1px solid #555; padding: 12px; margin: 10px 0; cursor: pointer; font-family: 'Courier New'; text-align: left; }
        .opcion-btn:hover { background: #222; border-color: #ff0000; color: #ff0000; }
        #pantalla-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #ff3333; padding: 50px; box-sizing: border-box; z-index: 10000; text-align: center; }
    </style>
</head>
<body>

    <div id="menu-inicio">
        <h1 style="font-size: 3.5em; letter-spacing: 10px; color: #ff0000;">TERROR EN CHIMBAS</h1>
        <p style="max-width: 600px; font-size: 1.2em; line-height: 1.5;">
            San Juan, Argentina. 2026.<br><br>
            Sos Alejo. Son 10 noches antes de las vacaciones.<br>
            Usa [F] para la linterna. No malgastes batería.<br>
            Jony se ve cada día más pálido...
        </p>
        <button id="btn-jugar">EMPEZAR TURNO</button>
    </div>

    <div id="ui">
        <div id="noche-info">NOCHE 1</div>
        <div id="battery-ui">
            LINTERNA [F]
            <div id="battery-bar-container"><div id="battery-bar"></div></div>
        </div>
        <div id="objetivo">Objetivo: Habla con Jony.</div>
        <div id="subtitulos"></div>
    </div>

    <div id="menu-dialogo">
        <p id="pregunta-jony" style="color: #ff0000; margin-bottom: 15px; font-weight: bold;"></p>
        <div id="contenedor-opciones"></div>
    </div>

    <div id="pantalla-final">
        <h1 style="border-bottom: 2px solid red;">DIARIO DE SAN JUAN - EDICIÓN CRÓNICA</h1>
        <div id="noticia-texto" style="font-size: 1.3em; max-width: 700px; margin: 40px auto; line-height: 1.6; text-align: left;"></div>
        <button onclick="location.reload()" style="background: red; color: white; border: none; padding: 10px 20px; cursor: pointer;">REINTENTAR TURNO</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        let noche = 1, misionPaso = 0, cajasRecogidas = 0, muerto = false, persiguiendo = false, iniciado = false;
        let bateria = 100, linternaOn = false;
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ILUMINACIÓN ---
        const luzAmbiental = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(luzAmbiental);
        const luzLocal = new THREE.PointLight(0xffffff, 1, 30);
        luzLocal.position.set(0, 3, 0);
        scene.add(luzLocal);

        const flashlight = new THREE.SpotLight(0xffffff, 0, 25, 0.35, 0.5);
        camera.add(flashlight);
        const lTarget = new THREE.Object3D();
        camera.add(lTarget);
        lTarget.position.set(0, 0, -5);
        flashlight.target = lTarget;
        scene.add(camera);

        // --- MAPA (Mantenido del original) ---
        const colisionables = [];
        function crearCaja(w, h, d, x, z, color = 0x222222, col = true) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({color: color}));
            m.position.set(x, h/2, z); scene.add(m);
            if(col) colisionables.push(new THREE.Box3().setFromObject(m));
            return m;
        }

        // Paredes y muebles
        crearCaja(26, 4, 1, 0, -16);
        crearCaja(1, 4, 32, -13, 0);
        crearCaja(1, 4, 32, 13, 0);
        crearCaja(11, 4, 1, -7.5, 16); 
        crearCaja(11, 4, 1, 7.5, 16);
        crearCaja(4, 1, 1, 0, 16, 0x444444); 
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshPhongMaterial({color: 0x111111}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);
        crearCaja(4, 1.1, 2, -9, 11, 0x3d2b1f); // Mostrador

        for(let i=0; i<3; i++) {
            let zP = 5 - (i*9);
            crearCaja(5, 2.8, 1.2, 7, zP, 0x151515);
            crearCaja(5, 2.8, 1.2, -7, zP, 0x151515);
        }

        // --- ENTIDADES ---
        function crearHumanoide(colorRopa, colorPiel, esManiqui = false) {
            const grupo = new THREE.Group();
            const matR = new THREE.MeshPhongMaterial({ color: colorRopa });
            const matP = new THREE.MeshPhongMaterial({ color: colorPiel, shininess: esManiqui ? 100 : 0 });
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.25), matR);
            torso.position.y = 1.2; torso.name = "torso";
            const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), matP);
            cabeza.position.y = 0.45; torso.add(cabeza);
            const bD = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.6, 0.12), matP);
            bD.position.set(0.35, 0, 0); bD.name = "brazoDer"; torso.add(bD);
            const bI = bD.clone(); bI.position.x = -0.35; bI.name = "brazoIzq"; torso.add(bI);
            grupo.add(torso);
            const pierna = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.8, 0.18), matR);
            const pD = pierna.clone(); pD.position.set(0.15, 0.4, 0); pD.name = "piernaDer"; grupo.add(pD);
            const pI = pierna.clone(); pI.position.set(-0.15, 0.4, 0); pI.name = "piernaIzq"; grupo.add(pI);
            return grupo;
        }

        const jony = crearHumanoide(0x2244aa, 0xffdbac);
        jony.position.set(-8, 0, 9); scene.add(jony);

        const maniqui = crearHumanoide(0xffffff, 0xffffff, true);
        maniqui.position.set(10, 0, -13); scene.add(maniqui);

        // --- DIÁLOGOS EXPANDIDOS ---
        const datosDialogo = {
            1: { p: "Jony: ¡Alejo! Primera noche de la tanda. ¿Me ayudás con estas cajas?", o: [{t:"Dale, rápido.", r:"Jony: Joya, terminemos esto."}] },
            2: { p: "Jony: ¿Viste las noticias? Dicen que anda un loco suelto en el Barrio II.", o: [{t:"Acá estamos seguros.", r:"Jony: Eso espero..."}] },
            3: { p: "Jony: Che... ¿moviste el maniqui del fondo?", o: [{t:"No, ¿por?", r:"Jony: Juraría que estaba mirando para allá."}] },
            4: { p: "Jony: Me siento re mareado. Como si el aire fuera pesado.", o: [{t:"Tomá agua.", r:"Jony: No es eso, es este lugar..."}] },
            5: { p: "Jony: Escuché que el dueño anterior desapareció acá adentro.", o: [{t:"Cuentos chinos.", r:"Jony: Ojalá, Alejo. Ojalá."}] },
            6: { p: "Jony: (Susurrando) El maniquí me habló. Me dijo que te quiere a vos.", o: [{t:"Estás mal, Jony.", r:"Jony: ...perdón, tengo sueño."}] },
            7: { p: "Jony: No quiero ir al fondo. Hay algo frío ahí.", o: [{t:"Voy yo, no seas cagón.", r:"Jony: Gracias... de verdad."}] },
            8: { p: "Jony: Si me pasa algo, avisale a mi vieja.", o: [{t:"No digas pavadas.", r:"Jony: Solo avisale."}] },
            9: { p: "Jony: Ya no aguanto. Me voy a encerrar en el baño.", o: [{t:"¡No me dejes solo!", r:"Jony: No puedo más..."}] },
            10: { p: "Jony: ...", o: [{t:"¿Jony?", r:"..."}] }
        };

        // --- LÓGICA DE JUEGO ---
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('btn-jugar').onclick = () => {
            document.getElementById('menu-inicio').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            iniciado = true;
            controls.lock();
            decir("Noche 1: Empieza el turno.");
        };

        const puntosSpawn = [{x: 0, z: 5}, {x: 0, z: -8}, {x: 8, z: 12}, {x: -8, z: -2}, {x: 10, z: 5}, {x: -10, z: -10}];
        const itemsMision = [];
        function spawnCajas() {
            itemsMision.forEach(c => scene.remove(c)); itemsMision.length = 0;
            puntosSpawn.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(p => {
                const c = crearCaja(0.7, 0.7, 0.7, p.x, p.z, 0x8b4513, false);
                itemsMision.push(c);
            });
        }
        spawnCajas();

        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyF' && bateria > 0) {
                linternaOn = !linternaOn;
                flashlight.intensity = linternaOn ? 5 : 0;
            }
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function decir(txt) {
            document.getElementById('subtitulos').innerText = txt;
            setTimeout(() => { if(document.getElementById('subtitulos').innerText === txt) document.getElementById('subtitulos').innerText = ""; }, 4000);
        }

        function mostrarMenuDialogo(n) {
            controls.unlock();
            const menu = document.getElementById('menu-dialogo');
            menu.style.display = 'block';
            document.getElementById('pregunta-jony').innerText = datosDialogo[n].p;
            const cont = document.getElementById('contenedor-opciones');
            cont.innerHTML = "";
            datosDialogo[n].o.forEach(opc => {
                const btn = document.createElement('button');
                btn.className = "opcion-btn"; btn.innerText = opc.t;
                btn.onclick = () => { 
                    menu.style.display = 'none'; 
                    decir(opc.r); 
                    misionPaso = 1; 
                    document.getElementById('objetivo').innerText = "Objetivo: Recoge las cajas."; 
                    controls.lock(); 
                };
                cont.appendChild(btn);
            });
        }

        function setNoche(n) {
            noche = n; misionPaso = 0; cajasRecogidas = 0;
            document.getElementById('noche-info').innerText = `NOCHE ${n}`;
            document.getElementById('objetivo').innerText = "Objetivo: Habla con Jony.";
            camera.position.set(0, 1.7, 13);
            spawnCajas();
            
            // Degradación de luz según la noche
            luzAmbiental.intensity = Math.max(0, 0.4 - (n * 0.04));
            luzLocal.intensity = Math.max(0.1, 1 - (n * 0.1));

            if(n === 10) {
                scene.remove(jony);
                document.getElementById('objetivo').innerText = "¿Donde está Jony?";
                luzAmbiental.intensity = 0;
                luzLocal.intensity = 0;
            }
        }

        function update() {
            requestAnimationFrame(update);
            if (!iniciado || !controls.isLocked || muerto) return;

            const time = Date.now() * 0.001;
            const oldPos = camera.position.clone();

            // Movimiento
            if(keys['KeyW']) controls.moveForward(0.12);
            if(keys['KeyS']) controls.moveForward(-0.12);
            if(keys['KeyA']) controls.moveRight(-0.12);
            if(keys['KeyD']) controls.moveRight(0.12);

            // Inmersión: Head Bobbing (Balanceo de cámara)
            if(keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD']) {
                camera.position.y = 1.7 + Math.sin(time * 10) * 0.05;
            }

            // Batería
            if(linternaOn) {
                bateria -= 0.02;
                document.getElementById('battery-bar').style.width = bateria + "%";
                if(bateria <= 0) { linternaOn = false; flashlight.intensity = 0; }
            }

            // Colisiones
            const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.6, 1.8, 0.6));
            for(let box of colisionables) { if(pBox.intersectsBox(box)) camera.position.copy(oldPos); }

            const pPos = camera.position;

            // Lógica de Noches 1-9
            if(noche < 10) {
                if(misionPaso === 0 && pPos.distanceTo(jony.position) < 2.5) { mostrarMenuDialogo(noche); misionPaso = -1; }
                if(misionPaso === 1) {
                    itemsMision.forEach((c, i) => {
                        if(pPos.distanceTo(c.position) < 1.5) {
                            scene.remove(c); itemsMision.splice(i, 1);
                            cajasRecogidas++; decir(`Cajas: ${cajasRecogidas}/3`);
                            if(cajasRecogidas === 3) { 
                                document.getElementById('objetivo').innerText = "Sal al callejón (atrás)."; 
                                misionPaso = 2; 
                            }
                        }
                    });
                }
                if(misionPaso === 2 && pPos.z > 15) setNoche(noche + 1);
            } 
            // Noche 10: El Final
            else {
                if(misionPaso === 0 && pPos.distanceTo(new THREE.Vector3(-8, 1, 9)) < 2.5) {
                    decir("Hay un charco de sangre acá...");
                    misionPaso = 1;
                    document.getElementById('objetivo').innerText = "¡CORRE A LA SALIDA!";
                }
                if(misionPaso === 1) {
                    const distM = pPos.distanceTo(maniqui.position);
                    if(distM < 15 && !persiguiendo) {
                        persiguiendo = true;
                        // Transformación
                        maniqui.getObjectByName("torso").rotation.x = Math.PI / 2.2;
                        maniqui.getObjectByName("torso").position.y = 0.4;
                    }
                    if(persiguiendo) {
                        const d = new THREE.Vector3().subVectors(pPos, maniqui.position).normalize();
                        maniqui.position.addScaledVector(d, 0.25); // Velocidad final
                        maniqui.lookAt(pPos.x, 0, pPos.z);
                        if(distM < 1.2) { muerto = true; final(); }
                    }
                    if(pPos.z > 15.5) {
                        muerto = true;
                        document.getElementById('pantalla-final').style.display = 'block';
                        document.getElementById('noticia-texto').innerText = "SOBREVIVISTE. Alejo logró escapar de la tienda en Chimbas, pero nunca volvió a ser el mismo. Jony nunca apareció. La tienda fue demolida un mes después.";
                    }
                }
            }

            renderer.render(scene, camera);
        }

        function final() {
            controls.unlock();
            document.getElementById('pantalla-final').style.display = 'block';
            document.getElementById('noticia-texto').innerText = "CHIMBAS - Jonathan fue hallado sin vida en el depósito. Alejo desapareció sin dejar rastro. El Diario de San Juan advierte sobre una presencia inhumana en la zona norte de la provincia.";
        }
        update();
    </script>
</body>
</html>
