<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terror en Chimbas: El Destino de Alejo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 10; text-shadow: 2px 2px black; display: none; }
        #objetivo { position: absolute; bottom: 30px; left: 30px; font-size: 18px; background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #ff0000; }
        #subtitulos { position: absolute; bottom: 120px; width: 100%; text-align: center; font-size: 22px; color: #fff; padding: 0 50px; }
        #noche-info { position: absolute; top: 30px; right: 30px; font-size: 28px; color: #ff0000; font-weight: bold; }
        #stats { position: absolute; top: 30px; left: 30px; font-size: 16px; }
        .bar-cont { width: 200px; height: 10px; background: #333; border: 1px solid #555; margin-top: 5px; }
        #bar-bateria { width: 100%; height: 100%; background: #00ff00; transition: 0.3s; }
        
        #menu-inicio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #1a0000 0%, #000000 100%);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; text-align: center;
        }
        #btn-jugar { 
            padding: 15px 50px; font-size: 22px; background: none; color: #ff0000; border: 2px solid #ff0000; cursor: pointer; 
            font-family: 'Courier New'; margin-top: 20px; transition: 0.4s;
        }
        #btn-jugar:hover { background: #ff0000; color: white; box-shadow: 0 0 30px red; }

        #menu-dialogo { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 1px solid #ff0000; padding: 30px; z-index: 2000; color: white;
            pointer-events: auto; width: 500px;
        }
        .opcion-btn { display: block; width: 100%; background: none; color: #ccc; border: 1px solid #444; padding: 15px; margin: 10px 0; cursor: pointer; font-family: 'Courier New'; text-align: left; transition: 0.2s; }
        .opcion-btn:hover { border-color: #ff0000; color: white; background: #1a0000; }
        
        #vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px #000; pointer-events: none; z-index: 5; }
        #pantalla-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #ff3333; padding: 50px; box-sizing: border-box; z-index: 10000; text-align: center; }
    </style>
</head>
<body>

    <div id="vignette"></div>

    <div id="menu-inicio">
        <h1 style="font-size: 4em; letter-spacing: 15px; color: #ff0000; margin: 0;">CHIMBAS</h1>
        <p style="font-size: 1.1em; color: #888;">TURNO PERMANENTE</p>
        <p style="max-width: 600px; font-size: 1.2em; line-height: 1.6; margin-top: 40px;">
            "Alejo, cuidá el local. No le abras a nadie.<br>
            Y si escuchás que algo se cae... no vayas a ver."
        </p>
        <button id="btn-jugar">ENTRAR AL LOCAL</button>
    </div>

    <div id="ui">
        <div id="noche-info">NOCHE 1</div>
        <div id="stats">
            LINTERNA [F]
            <div class="bar-cont"><div id="bar-bateria"></div></div>
        </div>
        <div id="objetivo">Encuentra a Jony.</div>
        <div id="subtitulos"></div>
    </div>

    <div id="menu-dialogo">
        <p id="pregunta-jony" style="color: #ff0000; margin-bottom: 20px; font-size: 1.2em;"></p>
        <div id="contenedor-opciones"></div>
    </div>

    <div id="pantalla-final">
        <h1 style="border-bottom: 1px solid red; letter-spacing: 5px;">CRÓNICA POLICIAL: SAN JUAN</h1>
        <div id="noticia-texto" style="font-size: 1.4em; max-width: 800px; margin: 50px auto; line-height: 1.8; text-align: left; background: #111; padding: 20px; border-radius: 5px;"></div>
        <button onclick="location.reload()" style="background: transparent; color: white; border: 1px solid white; padding: 15px 40px; cursor: pointer; font-family: 'Courier New';">VOLVER A INTENTAR</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        let noche = 1, misionPaso = 0, cajas = 0, muerto = false, iniciado = false;
        let bateria = 100, linternaEncendida = false;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LUCES ---
        const luzAmb = new THREE.AmbientLight(0xffffff, 0.1); scene.add(luzAmb);
        const luzLocal = new THREE.PointLight(0xffffff, 0.8, 25);
        luzLocal.position.set(0, 4, 0); scene.add(luzLocal);

        const flashlight = new THREE.SpotLight(0xffffff, 0, 30, 0.4, 0.6, 1);
        flashlight.castShadow = true;
        camera.add(flashlight);
        const lTarget = new THREE.Object3D();
        camera.add(lTarget);
        lTarget.position.set(0, 0, -5);
        flashlight.target = lTarget;
        scene.add(camera);

        // --- MAPA ---
        const colisionables = [];
        function crearMuro(w, h, d, x, z, color = 0x111111) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({color}));
            m.position.set(x, h/2, z); scene.add(m);
            colisionables.push(new THREE.Box3().setFromObject(m));
            return m;
        }

        crearMuro(30, 5, 1, 0, -16); // Fondo
        crearMuro(1, 5, 32, -15, 0); // Izq
        crearMuro(1, 5, 32, 15, 0);  // Der
        crearMuro(12, 5, 1, -9, 16); // Frente
        crearMuro(12, 5, 1, 9, 16);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.MeshPhongMaterial({color: 0x050505}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        // --- HUMANOS ---
        function crearEntidad(ropa, piel, maniqui = false) {
            const g = new THREE.Group();
            const matR = new THREE.MeshPhongMaterial({color: ropa});
            const matP = new THREE.MeshPhongMaterial({color: piel, shininess: maniqui ? 100 : 0});
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.8, 0.3), matR);
            torso.position.y = 1.3; torso.name = "torso";
            const cab = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), matP);
            cab.position.y = 0.5; torso.add(cab);
            const brazo = new THREE.BoxGeometry(0.12, 0.7, 0.12);
            const bD = new THREE.Mesh(brazo, matP); bD.name = "brazoD"; bD.position.set(0.35, 0, 0); torso.add(bD);
            const bI = bD.clone(); bI.name = "brazoI"; bI.position.x = -0.35; torso.add(bI);
            g.add(torso);
            const pierna = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.9, 0.2), matR);
            const pD = pierna.clone(); pD.position.set(0.15, 0.45, 0); g.add(pD);
            const pI = pierna.clone(); pI.position.set(-0.15, 0.45, 0); g.add(pI);
            return g;
        }

        const jony = crearEntidad(0x2233aa, 0xffdbac);
        jony.position.set(-10, 0, 10); scene.add(jony);

        const maniqui = crearEntidad(0xeeeeee, 0xeeeeee, true);
        maniqui.position.set(12, 0, -12); scene.add(maniqui);

        // --- DIÁLOGOS (10 NOCHES) ---
        const historia = {
            1: { p: "Jony: Hola Alejo. No pasó nada raro hoy. ¿Me ayudás con las cajas?", o: ["Dale.", "Pesado el turno..."] },
            2: { p: "Jony: Che, el jefe dice que falta ropa en el fondo.", o: ["Yo no fui.", "Habrá que revisar."] },
            3: { p: "Jony: ¿Viste al maniquí del fondo? Me parece que está más cerca.", o: ["Son ideas tuyas.", "Sí, lo noté."] },
            4: { p: "Jony: Siento que alguien camina arriba cuando apago la luz.", o: ["Son las ratas.", "Me estás asustando."] },
            5: { p: "Jony: Traje una linterna nueva. La luz está fallando.", o: ["Hacé que la arreglen.", "Ojalá no se corte."] },
            6: { p: "Jony: Alejo... vi al maniquí parpadear. Me voy al baño, no me esperes.", o: ["No me dejes solo.", "Andá tranquilo..."] },
            7: { p: "Jony: (Susurrando) Hay algo detrás de los percheros.", o: ["¡Callate!", "Voy a ver."] },
            8: { p: "Jony: No aguanto más. San Juan es chico, mañana me mudo a Mendoza.", o: ["Suerte.", "Esperame, voy con vos."] },
            9: { p: "Jony: ... (No responde, te mira fijo con los ojos abiertos)", o: ["¿Jony?", "Ey, reaccioná."] },
            10: { p: "...", o: ["...", "..."] }
        };

        // --- CONTROLES ---
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('btn-jugar').onclick = () => {
            document.getElementById('menu-inicio').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            iniciado = true;
            controls.lock();
            setNoche(1);
        };

        const items = [];
        function spawnItems(color, n=3) {
            items.forEach(i => scene.remove(i)); items.length = 0;
            for(let i=0; i<n; i++) {
                const c = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshPhongMaterial({color}));
                c.position.set((Math.random()-0.5)*25, 0.3, (Math.random()-0.5)*25);
                scene.add(c); items.push(c);
            }
        }

        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyF' && iniciado && bateria > 0) {
                linternaEncendida = !linternaEncendida;
                flashlight.intensity = linternaEncendida ? 4 : 0;
            }
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function decir(txt) {
            document.getElementById('subtitulos').innerText = txt;
            setTimeout(() => { document.getElementById('subtitulos').innerText = ""; }, 4000);
        }

        function setNoche(n) {
            noche = n; misionPaso = 0; cajas = 0;
            document.getElementById('noche-info').innerText = `NOCHE ${n}`;
            camera.position.set(0, 1.7, 13);
            
            // Dificultad visual
            luzLocal.intensity = Math.max(0, 1 - (n*0.1));
            
            if(n === 10) {
                scene.remove(jony);
                luzAmb.intensity = 0;
                flashlight.intensity = 4;
                linternaEncendida = true;
                document.getElementById('objetivo').innerText = "Sobrevive.";
                decir("Jony no está. El local está en silencio.");
            } else {
                document.getElementById('objetivo').innerText = "Habla con Jony.";
                spawnItems(0x664422);
            }
        }

        function abrirDialogo() {
            controls.unlock();
            const d = historia[noche];
            document.getElementById('pregunta-jony').innerText = d.p;
            const cont = document.getElementById('contenedor-opciones');
            cont.innerHTML = "";
            d.o.forEach(opt => {
                const b = document.createElement('button');
                b.className = "opcion-btn"; b.innerText = opt;
                b.onclick = () => {
                    document.getElementById('menu-dialogo').style.display = 'none';
                    misionPaso = 1;
                    decir("Jony: Juntá las cajas y ya nos podemos ir.");
                    document.getElementById('objetivo').innerText = "Recoge 3 cajas.";
                    controls.lock();
                };
                cont.appendChild(b);
            });
            document.getElementById('menu-dialogo').style.display = 'block';
        }

        function loop() {
            requestAnimationFrame(loop);
            if(!iniciado || muerto) return;

            const time = Date.now() * 0.002;

            if(controls.isLocked) {
                // Movimiento inmersivo (head bobbing)
                const vel = 0.12;
                const oldPos = camera.position.clone();
                if(keys['KeyW']) controls.moveForward(vel);
                if(keys['KeyS']) controls.moveForward(-vel);
                if(keys['KeyA']) controls.moveRight(-vel);
                if(keys['KeyD']) controls.moveRight(vel);
                
                if(keys['KeyW'] || keys['KeyS']) {
                    camera.position.y = 1.7 + Math.sin(time * 2) * 0.03;
                } else {
                    camera.position.y = 1.7 + Math.sin(time * 0.5) * 0.01; // Respiración
                }

                // Batería
                if(linternaEncendida) {
                    bateria -= 0.03;
                    if(bateria <= 0) {
                        bateria = 0; linternaEncendida = false; flashlight.intensity = 0;
                    }
                    document.getElementById('bar-bateria').style.width = bateria + "%";
                }

                // Colisiones
                const pB = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.7, 1.8, 0.7));
                for(let b of colisionables) { if(pB.intersectsBox(b)) camera.position.copy(oldPos); }

                const pP = camera.position;

                // Lógica de noches
                if(noche < 10) {
                    if(misionPaso === 0 && pP.distanceTo(jony.position) < 2.5) {
                        misionPaso = -1;
                        abrirDialogo();
                    }
                    if(misionPaso === 1) {
                        items.forEach((c, i) => {
                            if(pP.distanceTo(c.position) < 1.5) {
                                scene.remove(c); items.splice(i, 1);
                                cajas++;
                                if(cajas === 3) {
                                    misionPaso = 2;
                                    document.getElementById('objetivo').innerText = "Sal por la puerta principal.";
                                }
                            }
                        });
                    }
                    // Movimiento sutil del maniquí a partir de noche 5
                    if(noche >= 5 && Math.random() > 0.99) {
                        maniqui.lookAt(pP.x, 0, pP.z);
                    }
                    if(misionPaso === 2 && pP.z > 15) setNoche(noche + 1);
                } else {
                    // NOCHE 10 - EL CAOS
                    const dist = pP.distanceTo(maniqui.position);
                    const dir = new THREE.Vector3().subVectors(pP, maniqui.position).normalize();
                    
                    // El maniquí se deforma y persigue
                    if(!this.horrorIniciado && dist < 10) {
                        this.horrorIniciado = true;
                        maniqui.getObjectByName("torso").rotation.x = Math.PI / 2;
                        maniqui.getObjectByName("torso").position.y = 0.5;
                        decir("¡NO ES JONY! ¡NO ES JONY!");
                    }
                    
                    if(this.horrorIniciado) {
                        maniqui.position.addScaledVector(dir, 0.23);
                        maniqui.lookAt(pP.x, 0.5, pP.z);
                        // Glitch de luz
                        if(Math.random() > 0.9) flashlight.intensity = Math.random() * 5;
                        
                        if(dist < 1.2) {
                            muerto = true;
                            gameOver();
                        }
                    }
                }
            }
            renderer.render(scene, camera);
        }

        function gameOver() {
            controls.unlock();
            document.getElementById('pantalla-final').style.display = 'block';
            document.getElementById('ui').style.display = 'none';
            document.getElementById('noticia-texto').innerText = "URGENTE: Desaparición en Chimbas. \n\nVecinos reportaron gritos en la madrugada. Al ingresar la policía, el local estaba vacío, excepto por un maniquí de plástico que presentaba marcas de mordidas humanas y restos de una remera azul. Alejo no ha sido localizado.";
        }

        loop();
    </script>
</body>
</html>
