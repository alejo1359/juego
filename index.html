<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Terror en Chimbas: El Turno de Alejo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 10; text-shadow: 2px 2px black; display: none; }
        #objetivo { position: absolute; bottom: 30px; left: 30px; font-size: 18px; background: rgba(0,0,0,0.8); padding: 15px; border-left: 4px solid #00ff00; }
        #subtitulos { position: absolute; bottom: 100px; width: 100%; text-align: center; font-size: 20px; color: #ffff00; padding: 0 50px; }
        #noche-info { position: absolute; top: 30px; right: 30px; font-size: 24px; color: #ff0000; font-weight: bold; }
        
        #menu-inicio { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #220000 0%, #000000 100%);
            color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; text-align: center;
        }
        #btn-jugar { 
            padding: 15px 40px; font-size: 20px; background: #ff0000; color: white; border: none; cursor: pointer; 
            font-family: 'Courier New'; margin-top: 20px; box-shadow: 0 0 15px red;
        }
        #btn-jugar:hover { background: #aa0000; }

        #menu-dialogo { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 2px solid white; padding: 20px; z-index: 2000; color: white;
            pointer-events: auto; width: 450px; box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }
        .opcion-btn { display: block; width: 100%; background: none; color: white; border: 1px solid #555; padding: 12px; margin: 10px 0; cursor: pointer; font-family: 'Courier New'; text-align: left; }
        .opcion-btn:hover { background: #222; border-color: #00ff00; color: #00ff00; }
        #pantalla-final { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; color: #ff3333; padding: 50px; box-sizing: border-box; z-index: 1000; text-align: center; }
    </style>
</head>
<body>

    <div id="menu-inicio">
        <h1 style="font-size: 3.5em; letter-spacing: 10px; color: #ff0000;">TERROR EN CHIMBAS</h1>
        <p style="max-width: 600px; font-size: 1.2em; line-height: 1.5;">
            San Juan, Argentina. 2026.<br><br>
            Sos Alejo, un empleado en una tienda de ropa.<br>
            Al terminar tu turno, debes volver caminando a casa.<br>
            Cuidado con lo que hay en la oscuridad de las calles.
        </p>
        <button id="btn-jugar">EMPEZAR TURNO</button>
    </div>

    <div id="ui">
        <div id="noche-info">NOCHE 1</div>
        <div id="objetivo">Objetivo: Habla con tu compañero Jony.</div>
        <div id="subtitulos"></div>
    </div>

    <div id="menu-dialogo">
        <p id="pregunta-jony" style="color: #00ff00; margin-bottom: 15px; font-weight: bold;"></p>
        <div id="contenedor-opciones"></div>
    </div>

    <div id="pantalla-final">
        <h1 style="border-bottom: 2px solid red;">DIARIO DE SAN JUAN - EDICIÓN CRÓNICA</h1>
        <div id="noticia-texto" style="font-size: 1.3em; max-width: 700px; margin: 40px auto; line-height: 1.6; text-align: left;"></div>
        <button onclick="location.reload()" style="background: red; color: white; border: none; padding: 10px 20px; cursor: pointer;">REINTENTAR</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        let noche = 1, misionPaso = 0, cajasRecogidas = 0, muerto = false, persiguiendo = false, iniciado = false;
        const scene = new THREE.Scene();
        
        // NUEVO: Agregamos niebla para ocultar el final del mapa y dar atmósfera
        scene.fog = new THREE.FogExp2(0x000000, 0.025);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 13); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ILUMINACIÓN ---
        const luzAmbiental = new THREE.AmbientLight(0xffffff, 0.2); // Luces más bajas para la ciudad
        scene.add(luzAmbiental);
        const luzLocal = new THREE.PointLight(0xffffff, 0.8, 40);
        luzLocal.position.set(0, 4, 0); // Luz principal dentro de la tienda
        scene.add(luzLocal);

        // Linterna (Ahora llega más lejos para ver en las calles)
        const flashlight = new THREE.SpotLight(0xffffff, 0, 40, 0.35, 0.5);
        camera.add(flashlight);
        const lTarget = new THREE.Object3D();
        camera.add(lTarget);
        lTarget.position.set(0, 0, -5);
        flashlight.target = lTarget;
        scene.add(camera);

        const colisionables = [];
        function crearCaja(w, h, d, x, z, color = 0x444444, col = true) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({color: color}));
            m.position.set(x, h/2, z); scene.add(m);
            if(col) colisionables.push(new THREE.Box3().setFromObject(m));
            return m;
        }

        // --- MAPA: LA TIENDA ---
        crearCaja(26, 4, 1, 0, -16); // Pared fondo
        crearCaja(1, 4, 32, -13, 0); // Pared izq
        crearCaja(1, 4, 32, 13, 0);  // Pared der
        crearCaja(11, 4, 1, -7.5, 16); // Frente izq
        crearCaja(11, 4, 1, 7.5, 16);  // Frente der
        
        // --- MAPA: LA CIUDAD (Piso gigante) ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshPhongMaterial({color: 0x111111}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        // Mostrador y estanterías de la tienda
        crearCaja(4, 1.1, 2, -9, 11, 0x3d2b1f);
        for(let i=0; i<3; i++) {
            let zP = 5 - (i*9);
            crearCaja(5, 2.8, 1.2, 7, zP, 0x222222);
            crearCaja(5, 2.8, 1.2, -7, zP, 0x222222);
        }

        // NUEVO: SISTEMA DE GENERACIÓN DE CIUDAD
        // Creamos manzanas (bloques gigantes de edificios) alrededor de la tienda
        function generarCiudad() {
            for(let x = -100; x <= 100; x += 40) {
                for(let z = -100; z <= 100; z += 40) {
                    // Evitamos crear edificios justo donde está la tienda o tu casa
                    if (Math.abs(x) < 20 && Math.abs(z) < 30) continue; 
                    if (x === 40 && z === 80) continue; 

                    let altura = 10 + Math.random() * 20; // Altura aleatoria
                    crearCaja(25, altura, 25, x, z, 0x1a1a1a);
                }
            }
        }
        generarCiudad();

        // NUEVO: TU CASA
        const posCasa = new THREE.Vector3(40, 1.7, 80); // Coordenadas de tu casa
        crearCaja(16, 6, 16, posCasa.x, posCasa.z, 0x113311); // El edificio de tu casa
        // Una luz verde en la puerta para que sepas a dónde ir en la oscuridad
        const puertaCasa = new THREE.PointLight(0x00ff00, 2, 10);
        puertaCasa.position.set(posCasa.x, 2, posCasa.z - 9);
        scene.add(puertaCasa);

        // --- ENTIDADES ---
        function crearHumanoide(colorRopa, colorPiel, esManiqui = false) {
            const grupo = new THREE.Group();
            const matR = new THREE.MeshPhongMaterial({ color: colorRopa, shininess: esManiqui ? 100 : 10 });
            const matP = new THREE.MeshPhongMaterial({ color: colorPiel });
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.25), matR);
            torso.position.y = 1.2; torso.name = "torso";
            const cabeza = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), matP);
            cabeza.position.y = 0.45; cabeza.scale.y = 1.2; torso.add(cabeza);
            const bD = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.6, 0.12), matP); 
            bD.position.set(0.35, 0, 0); bD.name = "brazoDer"; torso.add(bD);
            const bI = bD.clone(); bI.position.x = -0.35; bI.name = "brazoIzq"; torso.add(bI);
            const pD = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.8, 0.18), matR); 
            pD.position.set(0.15, 0.4, 0); pD.name = "piernaDer"; grupo.add(pD);
            const pI = pD.clone(); pI.position.x = -0.15; pI.name = "piernaIzq"; grupo.add(pI);
            grupo.add(torso);
            return grupo;
        }

        const jony = crearHumanoide(0x2244aa, 0xffdbac, false);
        jony.position.set(-8, 0, 9); scene.add(jony);

        const maniqui = crearHumanoide(0xffffff, 0xffffff, true);
        maniqui.position.set(10, 0, -13); scene.add(maniqui);

        // --- LÓGICA ---
        const controls = new PointerLockControls(camera, document.body);
        document.getElementById('btn-jugar').onclick = () => {
            document.getElementById('menu-inicio').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            iniciado = true;
            controls.lock();
            camera.position.set(0, 1.7, 13); 
        };

        const puntosSpawn = [{x: 0, z: 5}, {x: 0, z: -8}, {x: 8, z: 12}, {x: -8, z: -2}, {x: 0, z: -14}];
        const itemsMision = [];
        function spawnCajas() {
            itemsMision.forEach(c => scene.remove(c)); itemsMision.length = 0;
            puntosSpawn.sort(() => 0.5 - Math.random()).slice(0, 3).forEach(p => {
                const c = crearCaja(0.7, 0.7, 0.7, p.x, p.z, 0x8b4513, false);
                itemsMision.push(c);
            });
        }
        spawnCajas();

        const keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function decir(txt) {
            document.getElementById('subtitulos').innerText = txt;
            setTimeout(() => { if(document.getElementById('subtitulos').innerText === txt) document.getElementById('subtitulos').innerText = ""; }, 4500);
        }

        const datosDialogo = {
            1: { pregunta: "Jony: ¡Hola Alejo! Linda noche, ¿no?", opciones: [{ t: "Sí, ojalá terminemos temprano.", r: "Jony: Olvidate, hay que acomodar todo." }, { t: "No tengo ganas hoy.", r: "Jony: Yo tampoco, pero bue..." }] },
            2: { pregunta: "Jony: Las calles de afuera están re oscuras hoy.", opciones: [{ t: "Ojalá no me roben volviendo.", r: "Jony: Ojalá sea solo un robo..." }, { t: "No pasa nada.", r: "Jony: Si vos decís..." }] },
            3: { pregunta: "Jony: Odio que tengas que volver caminando a tu casa.", opciones: [{ t: "Son un par de cuadras nomás.", r: "Jony: Igual. Tené cuidado." }, { t: "Me da igual.", r: "Jony: Que coraje." }] },
            4: { pregunta: "Jony: Escuché pasos arriba...", opciones: [{ t: "Ratas.", r: "Jony: Pasos pesados eran..." }, { t: "Flashás.", r: "Jony: Capaz..." }] },
            5: { pregunta: "Jony: El maniquí se movió...", opciones: [{ t: "Es el viento.", r: "Jony: No hay viento acá Alejo." }, { t: "Estás cansado.", r: "Jony: Puede ser." }] },
            6: { pregunta: "Jony: Me voy Alejo, esto me da miedo.", opciones: [{ t: "Quedate, es la última.", r: "Jony: Bueno... solo por vos." }, { t: "No seas cagón.", r: "Jony: Tenés razón." }] }
        };

        function mostrarMenuDialogo(n) {
            controls.unlock();
            const menu = document.getElementById('menu-dialogo');
            menu.style.display = 'block';
            document.getElementById('pregunta-jony').innerText = datosDialogo[n].pregunta;
            const cont = document.getElementById('contenedor-opciones');
            cont.innerHTML = "";
            datosDialogo[n].opciones.forEach(opc => {
                const btn = document.createElement('button');
                btn.className = "opcion-btn"; btn.innerText = opc.t;
                btn.onclick = () => { menu.style.display = 'none'; decir(opc.r); misionPaso = 1; document.getElementById('objetivo').innerText = "Objetivo: Recoge las 3 cajas en la tienda."; controls.lock(); };
                cont.appendChild(btn);
            });
        }

        function setNoche(n) {
            noche = n; misionPaso = 0; cajasRecogidas = 0;
            // Al empezar la noche, vuelves a la tienda
            camera.position.set(0, 1.7, 13);
            document.getElementById('noche-info').innerText = `NOCHE ${n}`;
            document.getElementById('objetivo').innerText = "Objetivo: Habla con Jony en el local.";
            spawnCajas();
            
            if(n === 7) {
                luzAmbiental.intensity = 0.05; luzLocal.intensity = 0; flashlight.intensity = 6; 
                scene.remove(jony);
                crearCaja(2, 0.01, 2, -8, 9, 0x440000, false); // Charco de sangre
                document.getElementById('objetivo').innerText = "Objetivo: ¿Jony?";
            }
        }

        function update() {
            requestAnimationFrame(update);
            if (!iniciado || !controls.isLocked || muerto) return;
            const oldPos = camera.position.clone();
            
            // Personaje un poco más rápido para recorrer la ciudad
            if(keys['KeyW']) controls.moveForward(0.25);
            if(keys['KeyS']) controls.moveForward(-0.25);
            if(keys['KeyA']) controls.moveRight(-0.25);
            if(keys['KeyD']) controls.moveRight(0.25);

            const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(0.6, 1.8, 0.6));
            for(let box of colisionables) { if(pBox.intersectsBox(box)) camera.position.copy(oldPos); }

            const pPos = camera.position;
            
            // --- NOCHES 1 A 6 ---
            if(noche < 7) {
                if(misionPaso === 0 && pPos.distanceTo(jony.position) < 2.5) { mostrarMenuDialogo(noche); misionPaso = -1; }
                if(misionPaso === 1) {
                    itemsMision.forEach((c, i) => {
                        if(pPos.distanceTo(c.position) < 2) {
                            scene.remove(c); itemsMision.splice(i, 1);
                            cajasRecogidas++; decir(`Cajas: ${cajasRecogidas}/3`);
                            if(cajasRecogidas === 3) { 
                                // NUEVO OBJETIVO: Ir a casa
                                document.getElementById('objetivo').innerText = "Fin del turno. Camina hasta tu casa (Luz verde)."; 
                                misionPaso = 2; 
                            }
                        }
                    });
                }
                // Si tienes que ir a casa, comprueba la distancia a la puerta de tu casa
                if(misionPaso === 2 && pPos.distanceTo(posCasa) < 12) {
                    decir("Llegaste a casa a salvo...");
                    setNoche(noche + 1);
                }
            } 
            // --- NOCHE 7 (EL FINAL) ---
            else {
                if(misionPaso === 0 && pPos.distanceTo(new THREE.Vector3(-8, 1, 9)) < 2.5) {
                    decir("¡LO MATÓ!"); misionPaso = 1; document.getElementById('objetivo').innerText = "¡CORRE A TU CASA!";
                }
                if(misionPaso === 1) {
                    const distM = pPos.distanceTo(maniqui.position);
                    if(distM < 20 && !persiguiendo) {
                        persiguiendo = true;
                        maniqui.getObjectByName("torso").rotation.x = Math.PI / 2.5; 
                        maniqui.getObjectByName("torso").position.y = 0.5; 
                        maniqui.getObjectByName("brazoDer").rotation.x = -Math.PI / 2; 
                        maniqui.getObjectByName("brazoIzq").rotation.x = -Math.PI / 2;
                    }
                    if(persiguiendo) {
                        const d = new THREE.Vector3().subVectors(pPos, maniqui.position).normalize();
                        maniqui.position.addScaledVector(d, 0.23); // Te persigue por toda la ciudad
                        maniqui.lookAt(pPos.x, 0, pPos.z);
                        if(distM < 1.5) { muerto = true; final("Muerte"); }
                    }
                    // Si llegas a tu casa huyendo
                    if(pPos.distanceTo(posCasa) < 12) {
                        muerto = true;
                        final("Salvado");
                    }
                }
            }
            renderer.render(scene, camera);
        }

        function final(tipo) {
            controls.unlock();
            document.getElementById('pantalla-final').style.display = 'block';
            if(tipo === "Muerte") {
                document.getElementById('noticia-texto').innerText = "CHIMBAS - Jonathan y Alejo desaparecieron. Testigos afirman haber escuchado gritos en las calles oscuras cerca de la tienda.";
            } else {
                document.getElementById('noticia-texto').innerText = "CHIMBAS - Sobreviviste. Alejo llegó a su casa aterrorizado. Jonathan fue hallado sin vida en la tienda. La figura blanca de Chimbas sigue libre...";
                document.querySelector('#pantalla-final button').innerText = "VOLVER A JUGAR";
            }
        }
        update();
    </script>
</body>
</html>
